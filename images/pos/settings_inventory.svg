  <rect x="636" y="124" width="100" height="28" rx="6"/>
  <text x="654" y="143" font-size="12" fill="#8B92A5">Depletion Log</text>

  <!-- ===== Main inventory table ===== -->
  <rect x="200" y="156" width="1240" height="36" fill="#1E2240"/>
  <text x="220" y="179" font-size="10" font-weight="600" fill="#6B7280">ITEM</text>
  <text x="420" y="179" font-size="10" font-weight="600" fill="#6B7280">SKU</text>
  <text x="510" y="179" font-size="10" font-weight="600" fill="#6B7280">UNIT</text>
