<svg role="img" aria-labelledby="title-ipad_00_pin_entry-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1366 1024" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif">
  <title id="title-ipad_00_pin_entry-svg">Synalux POS — 00 pin entry</title>
  <desc>Synalux POS mockup screen for 00 pin entry. All UI elements admin-configurable.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0E1A"/><stop offset="100%" stop-color="#080A14"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1D2E"/><stop offset="100%" stop-color="#161930"/>
    </linearGradient>
    <linearGradient id="amberBtnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="cardShadow"><feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="logoGlow"><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#F59E0B" flood-opacity="0.2"/></filter>
    <filter id="dotGlow"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#F59E0B" flood-opacity="0.4"/></filter>

    <!-- ═══ REUSABLE SYMBOLS ═══ -->

    <!-- Admin gear — admin: Settings > General -->
    <symbol id="adminGear" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="2.5" fill="none" stroke="#F59E0B" stroke-width="0.8" opacity="0.3"/>
      <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.8 2.8l1 1M10.2 10.2l1 1M2.8 11.2l1-1M10.2 3.8l1-1" stroke="#F59E0B" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
    </symbol>

    <!-- PIN numpad key — admin: Settings > Security > PIN Length -->
    <symbol id="pinKey" viewBox="0 0 100 80">
      <rect width="100" height="80" rx="12" fill="#1A1D2E" stroke="#2A2E45" stroke-width="1"/>
    </symbol>

    <!-- PIN dot (empty) -->
    <symbol id="pinDotEmpty" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#2A2E45" stroke-width="2"/>
    </symbol>

    <!-- PIN dot (filled) -->
    <symbol id="pinDotFilled" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="8" fill="#F59E0B" filter="url(#dotGlow)"/>
    </symbol>

    <!-- Staff avatar tile (for quick-select grid) — admin: Settings > Staff -->
    <symbol id="staffTile" viewBox="0 0 120 130">
      <rect width="120" height="130" rx="12" fill="#161930" stroke="#1E2235" stroke-width="1"/>
    </symbol>

    <!-- Clock-in status badge -->
    <symbol id="statusBadge" viewBox="0 0 80 20">
      <rect width="80" height="20" rx="4"/>
    </symbol>
  </defs>

  <!-- ═══════════ BACKGROUND ═══════════ -->
  <rect width="1366" height="1024" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="authGrid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#111425" stroke-width="0.3"/>
  </pattern>
  <rect width="1366" height="1024" fill="url(#authGrid)"/>

  <!-- ═══════════ TOP BAR (minimal) ═══════════ -->
  <rect x="0" y="0" width="1366" height="44" fill="#111425" opacity="0.8"/>
  <rect x="0" y="44" width="1366" height="1" fill="#1E2235"/>

  <!-- Venue name (admin: Settings > Venue > Name) -->
  <text x="20" y="28" fill="#F59E0B" font-size="14" font-weight="800">synalux</text>
  <text x="83" y="28" fill="#475569" font-size="14">POS</text>
  <use href="#adminGear" x="120" y="18" width="12" height="12"/>

  <!-- Register ID + time -->
  <text x="1200" y="20" fill="#475569" font-size="10" letter-spacing="0.5">REGISTER 1</text>
  <use href="#adminGear" x="1268" y="11" width="10" height="10"/>
  <text x="1200" y="36" fill="#94A3B8" font-size="13" font-weight="600">Fri, May 29 · 2:00 PM</text>

  <!-- Connection status -->
  <circle cx="1346" cy="22" r="5" fill="#22C55E"/>
  <text x="1326" y="36" fill="#475569" font-size="9" text-anchor="end">Online</text>

  <!-- ═══════════ CENTER — AUTH CARD ═══════════ -->
  <rect x="383" y="80" width="600" height="880" rx="20" fill="url(#cardGrad)" filter="url(#cardShadow)" stroke="#2A2E45" stroke-width="0.5"/>

  <!-- Logo -->
  <rect x="633" y="110" width="100" height="100" rx="24" fill="#F59E0B" filter="url(#logoGlow)"/>
  <text x="683" y="178" fill="#0C0E1A" font-size="48" font-weight="800" text-anchor="middle">S</text>

  <!-- Venue branding (admin: Settings > Venue > Name + Branding) -->
  <text x="683" y="240" fill="#E2E8F0" font-size="22" font-weight="700" text-anchor="middle">Riverside Grill</text>
  <text x="683" y="264" fill="#475569" font-size="12" text-anchor="middle">Enter your PIN to clock in — e.g. John S. (1234)</text>
  <use href="#adminGear" x="780" y="230" width="12" height="12"/>

  <!-- ═══ PIN Dots (4-digit, admin: Settings > Security > PIN Length) ═══ -->
  <use href="#pinDotFilled" x="573" y="290" width="20" height="20"/>
  <use href="#pinDotFilled" x="613" y="290" width="20" height="20"/>
  <use href="#pinDotFilled" x="653" y="290" width="20" height="20"/>
  <use href="#pinDotEmpty" x="693" y="290" width="20" height="20"/>
  <!-- 2 more dots for 6-digit option -->
  <use href="#pinDotEmpty" x="733" y="290" width="20" height="20" opacity="0.3"/>
  <use href="#pinDotEmpty" x="773" y="290" width="20" height="20" opacity="0.3"/>
  <text x="683" y="334" fill="#475569" font-size="10" text-anchor="middle">4-digit PIN · 3 dots entered</text>
  <use href="#adminGear" x="750" y="324" width="10" height="10"/>

  <!-- ═══ Numpad ═══ -->
  <!-- Row 1 -->
  <use href="#pinKey" x="443" y="352" width="100" height="80"/>
  <text x="493" y="402" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">1</text>
  <use href="#pinKey" x="553" y="352" width="100" height="80"/>
  <text x="603" y="402" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">2</text>
  <text x="603" y="418" fill="#475569" font-size="8" text-anchor="middle">ABC</text>
  <use href="#pinKey" x="663" y="352" width="100" height="80"/>
  <text x="713" y="402" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">3</text>
  <text x="713" y="418" fill="#475569" font-size="8" text-anchor="middle">DEF</text>

  <!-- Row 2 -->
  <use href="#pinKey" x="443" y="442" width="100" height="80"/>
  <text x="493" y="492" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">4</text>
  <text x="493" y="508" fill="#475569" font-size="8" text-anchor="middle">GHI</text>
  <use href="#pinKey" x="553" y="442" width="100" height="80"/>
  <text x="603" y="492" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">5</text>
  <text x="603" y="508" fill="#475569" font-size="8" text-anchor="middle">JKL</text>
  <use href="#pinKey" x="663" y="442" width="100" height="80"/>
  <text x="713" y="492" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">6</text>
  <text x="713" y="508" fill="#475569" font-size="8" text-anchor="middle">MNO</text>

  <!-- Row 3 -->
  <use href="#pinKey" x="443" y="532" width="100" height="80"/>
  <text x="493" y="582" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">7</text>
  <text x="493" y="598" fill="#475569" font-size="8" text-anchor="middle">PQRS</text>
  <use href="#pinKey" x="553" y="532" width="100" height="80"/>
  <text x="603" y="582" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">8</text>
  <text x="603" y="598" fill="#475569" font-size="8" text-anchor="middle">TUV</text>
  <use href="#pinKey" x="663" y="532" width="100" height="80"/>
  <text x="713" y="582" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">9</text>
  <text x="713" y="598" fill="#475569" font-size="8" text-anchor="middle">WXYZ</text>

  <!-- Row 4: Clear / 0 / Backspace -->
  <rect x="443" y="622" width="100" height="80" rx="12" fill="#1A0808" stroke="#2D0808" stroke-width="1"/>
  <text x="493" y="672" fill="#FCA5A5" font-size="14" font-weight="600" text-anchor="middle">Clear</text>
  <use href="#pinKey" x="553" y="622" width="100" height="80"/>
  <text x="603" y="672" fill="#E2E8F0" font-size="28" font-weight="500" text-anchor="middle">0</text>
  <rect x="663" y="622" width="100" height="80" rx="12" fill="#1A1D2E" stroke="#2A2E45" stroke-width="1"/>
  <text x="713" y="672" fill="#94A3B8" font-size="20" font-weight="600" text-anchor="middle">&#9003;</text>

  <!-- ═══ Clock-in button ═══ -->
  <rect x="443" y="720" width="320" height="56" rx="12" fill="url(#amberBtnGrad)"/>
  <text x="603" y="754" fill="#0C0E1A" font-size="16" font-weight="700" text-anchor="middle">Clock In</text>

  <!-- Already clocked in? -->
  <text x="683" y="800" fill="#475569" font-size="11" text-anchor="middle">Already clocked in? Tap your name below</text>

  <!-- ═══ Quick-select staff grid (admin: Settings > Staff Management) ═══ -->
  <text x="413" y="832" fill="#475569" font-size="9" font-weight="700" letter-spacing="1.5">ACTIVE STAFF</text>
  <use href="#adminGear" x="498" y="822" width="10" height="10"/>

  <!-- Staff tiles (from DB: pos_employees WHERE status='clocked_in') -->
  <use href="#staffTile" x="459" y="842" width="84" height="90"/>
  <circle cx="501" cy="868" r="16" fill="#2D1A10"/>
  <text x="501" y="873" fill="#F59E0B" font-size="12" font-weight="700" text-anchor="middle">SR</text>
  <text x="501" y="896" fill="#CBD5E1" font-size="9" font-weight="500" text-anchor="middle">Sara R.</text>
  <text x="501" y="910" fill="#F59E0B" font-size="8" text-anchor="middle">Manager</text>
  <rect x="478" y="916" width="46" height="10" rx="3" fill="#1A1200"/>
  <text x="501" y="924" fill="#F59E0B" font-size="7" text-anchor="middle">10:00 AM</text>

  <use href="#staffTile" x="551" y="842" width="84" height="90"/>
  <circle cx="593" cy="868" r="16" fill="#120A20"/>
  <text x="593" y="873" fill="#A78BFA" font-size="12" font-weight="700" text-anchor="middle">MR</text>
  <text x="593" y="896" fill="#CBD5E1" font-size="9" font-weight="500" text-anchor="middle">Mike R.</text>
  <text x="593" y="910" fill="#A78BFA" font-size="8" text-anchor="middle">Bartender</text>
  <rect x="570" y="916" width="46" height="10" rx="3" fill="#120A20"/>
  <text x="593" y="924" fill="#A78BFA" font-size="7" text-anchor="middle">4:00 PM</text>

  <use href="#staffTile" x="643" y="842" width="84" height="90"/>
  <circle cx="685" cy="868" r="16" fill="#0A1A2D"/>
  <text x="685" y="873" fill="#60A5FA" font-size="12" font-weight="700" text-anchor="middle">LW</text>
  <text x="685" y="896" fill="#CBD5E1" font-size="9" font-weight="500" text-anchor="middle">Lisa W.</text>
  <text x="685" y="910" fill="#60A5FA" font-size="8" text-anchor="middle">Host</text>
  <rect x="662" y="916" width="46" height="10" rx="3" fill="#0A1A2D"/>
  <text x="685" y="924" fill="#60A5FA" font-size="7" text-anchor="middle">11:30 AM</text>

  <!-- Footer info -->
  <text x="683" y="956" fill="#475569" font-size="10" text-anchor="middle">Manager override: hold 3 sec on any staff tile</text>

  <!-- ═══ LEFT PANEL — Today's Summary ═══ -->
  <rect x="40" y="100" width="300" height="200" rx="14" fill="#111425" stroke="#1E2235" stroke-width="0.5"/>
  <text x="60" y="130" fill="#475569" font-size="9" font-weight="700" letter-spacing="1.5">TODAY</text>

  <text x="60" y="158" fill="#94A3B8" font-size="11">Clocked In</text>
  <text x="310" y="158" fill="#4ADE80" font-size="14" font-weight="700" text-anchor="end">3 staff</text>

  <text x="60" y="184" fill="#94A3B8" font-size="11">Open Tables</text>
  <text x="310" y="184" fill="#F59E0B" font-size="14" font-weight="700" text-anchor="end">0 / 18</text>

  <text x="60" y="210" fill="#94A3B8" font-size="11">Revenue</text>
  <text x="310" y="210" fill="#E2E8F0" font-size="14" font-weight="700" text-anchor="end">$0</text>

  <text x="60" y="236" fill="#94A3B8" font-size="11">Avg Ticket</text>
  <text x="310" y="236" fill="#E2E8F0" font-size="14" font-weight="700" text-anchor="end">--</text>

  <text x="60" y="262" fill="#94A3B8" font-size="11">Alerts</text>
  <text x="310" y="262" fill="#475569" font-size="14" font-weight="700" text-anchor="end">0</text>

  <!-- ═══ RIGHT PANEL — Role-Based Routing Preview ═══ -->
  <!-- admin: Settings > Staff > Roles (7-level RBAC) -->
  <rect x="1026" y="100" width="300" height="340" rx="14" fill="#111425" stroke="#1E2235" stroke-width="0.5"/>
  <text x="1046" y="130" fill="#475569" font-size="9" font-weight="700" letter-spacing="1.5">ROLE ROUTING</text>
  <use href="#adminGear" x="1146" y="120" width="10" height="10"/>

  <!-- Role → Screen mapping (admin: Settings > Staff > Role Routing) -->
  <text x="1046" y="158" fill="#4ADE80" font-size="11" font-weight="600">Server</text>
  <text x="1306" y="158" fill="#94A3B8" font-size="11" text-anchor="end">&#8594; Register + Tables</text>

  <text x="1046" y="182" fill="#60A5FA" font-size="11" font-weight="600">Host</text>
  <text x="1306" y="182" fill="#94A3B8" font-size="11" text-anchor="end">&#8594; Tables + Waitlist</text>

  <text x="1046" y="206" fill="#A78BFA" font-size="11" font-weight="600">Bartender</text>
  <text x="1306" y="206" fill="#94A3B8" font-size="11" text-anchor="end">&#8594; Bar Register</text>

  <text x="1046" y="230" fill="#E2E8F0" font-size="11" font-weight="600">Cashier</text>
  <text x="1306" y="230" fill="#94A3B8" font-size="11" text-anchor="end">&#8594; Register</text>

  <text x="1046" y="254" fill="#22D3EE" font-size="11" font-weight="600">Supervisor</text>
  <text x="1306" y="254" fill="#94A3B8" font-size="11" text-anchor="end">&#8594; Register + Reports</text>

  <text x="1046" y="278" fill="#F59E0B" font-size="11" font-weight="600">Manager</text>
  <text x="1306" y="278" fill="#94A3B8" font-size="11" text-anchor="end">&#8594; Dashboard + All</text>

  <text x="1046" y="302" fill="#EF4444" font-size="11" font-weight="600">Admin</text>
  <text x="1306" y="302" fill="#94A3B8" font-size="11" text-anchor="end">&#8594; Settings + All</text>

  <rect x="1046" y="316" width="260" height="1" fill="#1E2235"/>
  <text x="1046" y="340" fill="#475569" font-size="9">After PIN, staff sees only screens</text>
  <text x="1046" y="354" fill="#475569" font-size="9">permitted by their assigned role.</text>
  <text x="1046" y="374" fill="#475569" font-size="9">Multi-role staff get a role picker.</text>

  <!-- Flow diagram: PIN → Role → Screen -->
  <rect x="1026" y="460" width="300" height="100" rx="14" fill="#111425" stroke="#1E2235" stroke-width="0.5"/>
  <text x="1046" y="488" fill="#475569" font-size="9" font-weight="700" letter-spacing="1.5">AUTH FLOW</text>

  <!-- Step 1 -->
  <rect x="1046" y="500" width="60" height="26" rx="6" fill="#1A1D2E" stroke="#F59E0B" stroke-width="1"/>
  <text x="1076" y="518" fill="#F59E0B" font-size="9" font-weight="600" text-anchor="middle">PIN</text>
  <!-- Arrow -->
  <text x="1116" y="518" fill="#475569" font-size="12">&#8594;</text>
  <!-- Step 2 -->
  <rect x="1130" y="500" width="60" height="26" rx="6" fill="#1A1D2E" stroke="#60A5FA" stroke-width="1"/>
  <text x="1160" y="518" fill="#60A5FA" font-size="9" font-weight="600" text-anchor="middle">Role</text>
  <!-- Arrow -->
  <text x="1200" y="518" fill="#475569" font-size="12">&#8594;</text>
  <!-- Step 3 -->
  <rect x="1214" y="500" width="80" height="26" rx="6" fill="#1A1D2E" stroke="#22C55E" stroke-width="1"/>
  <text x="1254" y="518" fill="#4ADE80" font-size="9" font-weight="600" text-anchor="middle">Screen</text>

  <text x="1176" y="546" fill="#475569" font-size="8" text-anchor="middle">Single-role staff skip step 2</text>
</svg>