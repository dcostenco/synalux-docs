  <rect x="924" y="504" width="428" height="180" rx="16" fill="white" stroke="#F3F4F6" stroke-width="1"/>
  <rect x="924" y="504" width="428" height="100" rx="16" fill="#EFF6FF"/>
  <rect x="924" y="564" width="428" height="40" fill="#EFF6FF"/>
  <text x="1138" y="566" font-size="60" text-anchor="middle">🍔</text>
