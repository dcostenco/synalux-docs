<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="1440" height="900" fill="#FAFAF8"/>

  <!-- Top navigation -->
  <rect x="0" y="0" width="1440" height="72" fill="white"/>
