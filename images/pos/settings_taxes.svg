  <text x="244" y="822" fill="#60A5FA" font-size="13" font-weight="700">📐 Tax Calculation Formula</text>
  <text x="244" y="842" fill="#94A3B8" font-size="12">US: subtotal × rate = tax (added to total)</text>
  <text x="244" y="858" fill="#94A3B8" font-size="12">CA compound: (subtotal + GST) × PST_rate</text>
  <text x="244" y="874" fill="#94A3B8" font-size="12">VAT inclusive: tax = price − (price ÷ (1 + rate))</text>

  <!-- Assign to revenue center -->
  <rect x="790" y="800" width="564" height="80" rx="10" fill="#2D1A00"/>
  <text x="810" y="822" fill="#F59E0B" font-size="13" font-weight="700">📍 Assign Zones to Revenue Centers</text>
  <text x="810" y="842" fill="#94A3B8" font-size="12">Each zone must be linked to one or more revenue centers.</text>
  <text x="810" y="858" fill="#94A3B8" font-size="12">Revenue center → pos_revenue_centers.tax_zone_ids[]</text>
  <text x="810" y="874" fill="#F59E0B" font-size="12">Configure in Floor Plans → Revenue Center settings</text>

  <text x="683" y="895" fill="#1E2235" font-size="11" text-anchor="middle">Synalux POS — Tax Configuration (F10 Open/Close Day + F14 Reporting · Back Office · 1366×900)</text>
