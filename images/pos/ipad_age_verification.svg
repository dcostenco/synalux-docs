<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1366 1024" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background / dimmed register behind -->
  <rect width="1366" height="1024" fill="#0F1117"/>
  <rect width="1366" height="1024" fill="#000" opacity="0.65"/>

  <!-- === MAIN MODAL === -->
  <rect x="100" y="60" width="1166" height="904" rx="20" fill="#13162A"/>
  <rect x="100" y="60" width="1166" height="904" rx="20" fill="none" stroke="#F59E0B" stroke-width="2"/>

  <!-- Red alert top bar (alcohol trigger) -->
  <rect x="100" y="60" width="1166" height="8" rx="4" fill="#EF4444"/>

  <!-- Header -->
  <rect x="100" y="68" width="1166" height="70" rx="20" fill="#2D0808"/>
  <rect x="100" y="108" width="1166" height="30" fill="#2D0808"/>
  <text x="140" y="100" fill="#EF4444" font-size="28" font-weight="700">🔞  Age Verification Required</text>
  <text x="140" y="128" fill="#F87171" font-size="15">Alcohol item detected: 1× Draft Beer — ID must be verified before adding to order</text>
  <rect x="1190" y="80" width="50" height="44" rx="8" fill="#1E2235"/>
  <text x="1215" y="106" fill="#64748B" font-size="20" text-anchor="middle">✕</text>

  <!-- === LEFT: Scan Flow Steps === -->
  <rect x="120" y="148" width="480" height="796" rx="12" fill="#0F1117"/>

  <!-- Step indicator -->
  <text x="140" y="184" fill="#64748B" font-size="11" font-weight="700" letter-spacing="2">VERIFICATION METHOD</text>

  <!-- Step 1: Scan ID (primary) -->
  <rect x="132" y="194" width="456" height="130" rx="14" fill="#1A1D2E" stroke="#F59E0B" stroke-width="2"/>
  <!-- Active indicator -->
  <rect x="132" y="194" width="6" height="130" rx="3" fill="#F59E0B"/>
  <rect x="148" y="208" width="56" height="56" rx="10" fill="#F59E0B"/>
  <text x="176" y="246" fill="#0F1117" font-size="28" text-anchor="middle">📷</text>
  <text x="215" y="228" fill="#E2E8F0" font-size="16" font-weight="700">Scan Driver's License</text>
  <text x="215" y="248" fill="#94A3B8" font-size="13">Point camera at back of ID (PDF417 barcode)</text>
  <text x="215" y="266" fill="#94A3B8" font-size="13">or swipe magnetic stripe reader</text>
  <!-- RECOMMENDED badge -->
  <rect x="215" y="276" width="100" height="22" rx="6" fill="#1A3320"/>
  <text x="265" y="291" fill="#22C55E" font-size="12" font-weight="700" text-anchor="middle">✓ Recommended</text>
  <text x="570" y="262" fill="#F59E0B" font-size="13" font-weight="700" text-anchor="end">Fastest</text>

  <!-- Step 2: Manual DOB -->
  <rect x="132" y="336" width="456" height="100" rx="14" fill="#1E2235"/>
  <rect x="148" y="352" width="44" height="44" rx="10" fill="#1E2235" stroke="#64748B" stroke-width="1"/>
  <text x="170" y="380" fill="#64748B" font-size="22" text-anchor="middle">⌨</text>
  <text x="204" y="374" fill="#CBD5E1" font-size="16" font-weight="600">Enter Date of Birth</text>
  <text x="204" y="394" fill="#64748B" font-size="13">Manual entry · requires manager PIN</text>
  <text x="204" y="412" fill="#64748B" font-size="12">MM / DD / YYYY</text>

  <!-- Step 3: Known customer -->
  <rect x="132" y="448" width="456" height="100" rx="14" fill="#1E2235"/>
  <rect x="148" y="464" width="44" height="44" rx="10" fill="#1E2235" stroke="#64748B" stroke-width="1"/>
  <text x="170" y="492" fill="#64748B" font-size="22" text-anchor="middle">👤</text>
  <text x="204" y="484" fill="#CBD5E1" font-size="16" font-weight="600">Loyalty Customer</text>
  <text x="204" y="504" fill="#64748B" font-size="13">DOB on file from loyalty profile</text>
  <text x="204" y="522" fill="#64748B" font-size="12">Auto-verified if DOB confirmed previously</text>

  <!-- How scanning works -->
  <text x="140" y="584" fill="#64748B" font-size="11" font-weight="700" letter-spacing="2">HOW DL SCANNING WORKS</text>

  <!-- iOS flow diagram -->
  <rect x="132" y="594" width="456" height="280" rx="12" fill="#1A1D2E"/>

  <!-- Flow steps -->
  <circle cx="160" cy="626" r="16" fill="#F59E0B"/>
  <text x="160" y="631" fill="#0F1117" font-size="12" font-weight="700" text-anchor="middle">1</text>
  <text x="186" y="622" fill="#E2E8F0" font-size="13" font-weight="600">iOS AVCaptureSession activates camera</text>
  <text x="186" y="640" fill="#64748B" font-size="12">Back-facing camera, auto-focus on barcode</text>

  <rect x="158" y="650" width="2" height="28" fill="#2D3050"/>

  <circle cx="160" cy="690" r="16" fill="#F59E0B"/>
  <text x="160" y="695" fill="#0F1117" font-size="12" font-weight="700" text-anchor="middle">2</text>
  <text x="186" y="686" fill="#E2E8F0" font-size="13" font-weight="600">Vision framework decodes PDF417</text>
  <text x="186" y="704" fill="#64748B" font-size="12">AAMVA standard DL data format extracted</text>

  <rect x="158" y="714" width="2" height="28" fill="#2D3050"/>

  <circle cx="160" cy="754" r="16" fill="#F59E0B"/>
  <text x="160" y="759" fill="#0F1117" font-size="12" font-weight="700" text-anchor="middle">3</text>
  <text x="186" y="750" fill="#E2E8F0" font-size="13" font-weight="600">IDScanBridge.swift sends DOB to WebView</text>
  <text x="186" y="768" fill="#64748B" font-size="12">postMessage({type:'id_scan', dob:'19850412', expiry:'20280415'})</text>

  <rect x="158" y="778" width="2" height="28" fill="#2D3050"/>

  <circle cx="160" cy="818" r="16" fill="#22C55E"/>
  <text x="160" y="823" fill="white" font-size="12" font-weight="700" text-anchor="middle">4</text>
  <text x="186" y="814" fill="#E2E8F0" font-size="13" font-weight="600">POS calculates age → allow / block</text>
  <text x="186" y="832" fill="#64748B" font-size="12">Logs to pos_audit_log (DOB + doc_last_4 only)</text>

  <rect x="158" y="842" width="2" height="18" fill="#2D3050"/>

  <!-- Privacy note -->
  <rect x="140" y="868" width="452" height="56" rx="8" fill="#102020"/>
  <text x="156" y="892" fill="#06B6D4" font-size="13" font-weight="600">🔒  Privacy: Full ID data NOT stored</text>
  <text x="156" y="910" fill="#64748B" font-size="12">Only: verification result (pass/fail) + last 4 of document number + timestamp</text>

  <!-- === CENTER: Camera View === -->
  <rect x="620" y="148" width="380" height="500" rx="14" fill="#080C14"/>
  <rect x="620" y="148" width="380" height="500" rx="14" fill="none" stroke="#F59E0B" stroke-width="2"/>

  <!-- Camera viewfinder -->
  <text x="810" y="210" fill="#94A3B8" font-size="14" text-anchor="middle">Point at back of ID</text>

  <!-- Simulated camera view - ID card -->
  <rect x="660" y="220" width="300" height="200" rx="8" fill="#1A2A3A"/>
  <!-- Corner guides -->
  <rect x="662" y="222" width="30" height="3" fill="#F59E0B"/>
  <rect x="662" y="222" width="3" height="30" fill="#F59E0B"/>
  <rect x="928" y="222" width="30" height="3" fill="#F59E0B"/>
  <rect x="955" y="222" width="3" height="30" fill="#F59E0B"/>
  <rect x="662" y="417" width="30" height="3" fill="#F59E0B"/>
  <rect x="662" y="389" width="3" height="30" fill="#F59E0B"/>
  <rect x="928" y="417" width="30" height="3" fill="#F59E0B"/>
  <rect x="955" y="389" width="3" height="30" fill="#F59E0B"/>

  <!-- ID card representation -->
  <rect x="670" y="230" width="282" height="182" rx="8" fill="#1C3054"/>
  <!-- State name area -->
  <rect x="678" y="238" width="266" height="30" rx="4" fill="#142040"/>
  <text x="811" y="257" fill="#E2E8F0" font-size="14" font-weight="700" text-anchor="middle">DRIVER LICENSE</text>
  <text x="811" y="271" fill="#94A3B8" font-size="11" text-anchor="middle">STATE OF CALIFORNIA</text>
  <!-- Photo placeholder -->
  <rect x="678" y="274" width="64" height="80" rx="4" fill="#0D1A2A"/>
  <text x="710" y="320" fill="#2D3050" font-size="28" text-anchor="middle">👤</text>
  <!-- Text fields -->
  <text x="752" y="288" fill="#94A3B8" font-size="9">LN: GARCIA</text>
  <text x="752" y="302" fill="#94A3B8" font-size="9">FN: MARIA ELENA</text>
  <text x="752" y="316" fill="#94A3B8" font-size="9">DOB: 04/12/1985</text>
  <text x="752" y="330" fill="#94A3B8" font-size="9">EXP: 04/15/2028</text>
  <text x="752" y="344" fill="#94A3B8" font-size="9">ID: D1234567</text>
  <!-- PDF417 barcode representation -->
  <rect x="678" y="366" width="266" height="38" rx="4" fill="#0A0A0A"/>
  <text x="811" y="390" fill="#333" font-size="9" text-anchor="middle">▐▌▌▌▐▌▐▌▌▌▐▐▌▌▌▐▌▐▐▌▌▌▐▌▐▌▌▌▐▐▌▌▌▐▌▐▐▌▌▌▐▌▐▌▌▌▐▐▌▌▌▐▌</text>
  <text x="811" y="402" fill="#333" font-size="9" text-anchor="middle">▐▐▌▌▌▐▌▐▌▌▐▐▌▌▌▐▌▐▐▌▌▌▐▌▐▌▌▌▐▐▌▌▌▐▌▐▐▌▌▌▐▌▐▌▌▌▐▐▌▌▌▐</text>

  <!-- Scan line animation -->
  <rect x="660" y="318" width="300" height="2" fill="#F59E0B" opacity="0.8"/>
  <rect x="660" y="318" width="300" height="40" fill="#F59E0B" opacity="0.05"/>

  <!-- Camera controls -->
  <text x="810" y="448" fill="#94A3B8" font-size="13" text-anchor="middle">Align PDF417 barcode in frame</text>
  <!-- Flash toggle -->
  <rect x="680" y="460" width="80" height="34" rx="8" fill="#1E2235"/>
  <text x="720" y="481" fill="#94A3B8" font-size="13" text-anchor="middle">⚡ Flash</text>
  <!-- Manual entry fallback -->
  <rect x="850" y="460" width="130" height="34" rx="8" fill="#1E2235"/>
  <text x="915" y="481" fill="#94A3B8" font-size="13" text-anchor="middle">⌨ Manual entry</text>

  <!-- Scanning status -->
  <rect x="630" y="510" width="360" height="50" rx="10" fill="#1A3320"/>
  <text x="810" y="532" fill="#22C55E" font-size="14" font-weight="600" text-anchor="middle">🔍 Scanning... barcode detected</text>
  <text x="810" y="550" fill="#4ADE80" font-size="12" text-anchor="middle">Reading PDF417 data...</text>

  <!-- Progress bar -->
  <rect x="630" y="570" width="360" height="6" rx="3" fill="#1E2235"/>
  <rect x="630" y="570" width="280" height="6" rx="3" fill="#22C55E"/>

  <!-- === CENTER BOTTOM: Result card === -->
  <!-- PASS case -->
  <rect x="620" y="590" width="380" height="200" rx="14" fill="#0D2B12" stroke="#22C55E" stroke-width="2"/>
  <rect x="620" y="590" width="380" height="8" rx="4" fill="#22C55E"/>
  <text x="810" y="640" fill="#22C55E" font-size="40" text-anchor="middle">✓</text>
  <text x="810" y="672" fill="#22C55E" font-size="22" font-weight="700" text-anchor="middle">ID VERIFIED — PASS</text>
  <text x="810" y="696" fill="#4ADE80" font-size="15" text-anchor="middle">Maria Garcia · DOB: April 12, 1985</text>
  <text x="810" y="716" fill="#4ADE80" font-size="14" text-anchor="middle">Age: 41 years · Legal drinking age ✓</text>
  <text x="810" y="736" fill="#64748B" font-size="12" text-anchor="middle">ID expires: Apr 15, 2028 · Valid ✓</text>
  <text x="810" y="756" fill="#64748B" font-size="12" text-anchor="middle">Logged: doc •••• 4567 · 2:22 PM</text>
  <rect x="660" y="768" width="300" height="14" rx="5" fill="#22C55E" opacity="0.2"/>

  <!-- FAIL case (shown smaller below as reference) -->
  <rect x="620" y="798" width="380" height="130" rx="14" fill="#2D0808" stroke="#EF4444" stroke-width="2"/>
  <rect x="620" y="798" width="380" height="8" rx="4" fill="#EF4444"/>
  <text x="810" y="828" fill="#EF4444" font-size="18" font-weight="700" text-anchor="middle">✗ ID BLOCKED — UNDER AGE</text>
  <text x="810" y="850" fill="#F87171" font-size="14" text-anchor="middle">DOB: July 3, 2006 · Age: 18 years</text>
  <text x="810" y="870" fill="#F87171" font-size="13" text-anchor="middle">Legal drinking age: 21 (US) · Denied</text>
  <text x="810" y="892" fill="#EF4444" font-size="13" font-weight="700" text-anchor="middle">Item REMOVED from order automatically</text>
  <text x="810" y="910" fill="#64748B" font-size="11" text-anchor="middle">Refusal logged · Manager notified</text>

  <!-- === RIGHT: Interaction states === -->
  <rect x="1020" y="148" width="226" height="796" rx="12" fill="#0F1117"/>

  <text x="1040" y="184" fill="#64748B" font-size="11" font-weight="700" letter-spacing="2">OUTCOME STATES</text>

  <!-- State 1: Pass -->
  <rect x="1032" y="194" width="202" height="120" rx="10" fill="#0D2B12" stroke="#22C55E" stroke-width="1"/>
  <text x="1133" y="218" fill="#22C55E" font-size="16" font-weight="700" text-anchor="middle">✓ PASS</text>
  <text x="1133" y="238" fill="#4ADE80" font-size="12" text-anchor="middle">Age 21+ (US)</text>
  <text x="1133" y="256" fill="#4ADE80" font-size="12" text-anchor="middle">Age 18+ (CA/EU)</text>
  <rect x="1040" y="268" width="186" height="32" rx="8" fill="#22C55E"/>
  <text x="1133" y="288" fill="white" font-size="13" font-weight="700" text-anchor="middle">Add Beer to Order</text>
  <text x="1133" y="306" fill="#64748B" font-size="11" text-anchor="middle">Staff sees green banner</text>

  <!-- State 2: Under age -->
  <rect x="1032" y="330" width="202" height="130" rx="10" fill="#2D0808" stroke="#EF4444" stroke-width="1"/>
  <text x="1133" y="354" fill="#EF4444" font-size="16" font-weight="700" text-anchor="middle">✗ BLOCKED</text>
  <text x="1133" y="374" fill="#F87171" font-size="12" text-anchor="middle">Under drinking age</text>
  <text x="1133" y="392" fill="#F87171" font-size="12" text-anchor="middle">Item auto-removed</text>
  <rect x="1040" y="402" width="186" height="32" rx="8" fill="#2D0808" stroke="#EF4444" stroke-width="1"/>
  <text x="1133" y="422" fill="#EF4444" font-size="13" font-weight="600" text-anchor="middle">Refusal Logged</text>
  <text x="1133" y="452" fill="#64748B" font-size="11" text-anchor="middle">Manager auto-notified</text>

  <!-- State 3: Expired ID -->
  <rect x="1032" y="476" width="202" height="120" rx="10" fill="#2D1A00" stroke="#F59E0B" stroke-width="1"/>
  <text x="1133" y="500" fill="#F59E0B" font-size="16" font-weight="700" text-anchor="middle">⚠ EXPIRED ID</text>
  <text x="1133" y="520" fill="#FBBF24" font-size="12" text-anchor="middle">Age OK, ID expired</text>
  <text x="1133" y="540" fill="#94A3B8" font-size="11" text-anchor="middle">Operator choice:</text>
  <text x="1133" y="558" fill="#94A3B8" font-size="11" text-anchor="middle">Warn or Block</text>
  <rect x="1040" y="566" width="186" height="28" rx="8" fill="#2D1A00" stroke="#F59E0B" stroke-width="1"/>
  <text x="1133" y="584" fill="#F59E0B" font-size="12" font-weight="600" text-anchor="middle">Manager Override PIN</text>

  <!-- State 4: Manual DOB entry -->
  <rect x="1032" y="612" width="202" height="130" rx="10" fill="#10202D" stroke="#3B82F6" stroke-width="1"/>
  <text x="1133" y="636" fill="#60A5FA" font-size="15" font-weight="700" text-anchor="middle">⌨ Manual DOB</text>
  <text x="1133" y="656" fill="#94A3B8" font-size="12" text-anchor="middle">Requires mgr PIN</text>
  <!-- Mini numpad -->
  <rect x="1048" y="668" width="40" height="30" rx="4" fill="#1E2235"/>
  <text x="1068" y="687" fill="#E2E8F0" font-size="13" text-anchor="middle">1</text>
  <rect x="1094" y="668" width="40" height="30" rx="4" fill="#1E2235"/>
  <text x="1114" y="687" fill="#E2E8F0" font-size="13" text-anchor="middle">2</text>
  <rect x="1140" y="668" width="40" height="30" rx="4" fill="#1E2235"/>
  <text x="1160" y="687" fill="#E2E8F0" font-size="13" text-anchor="middle">3</text>
  <rect x="1186" y="668" width="40" height="30" rx="4" fill="#EF4444"/>
  <text x="1206" y="687" fill="white" font-size="12" text-anchor="middle">⌫</text>
  <rect x="1048" y="704" width="178" height="30" rx="4" fill="#1E2235"/>
  <text x="1137" y="723" fill="#64748B" font-size="13" text-anchor="middle">MM / DD / YYYY</text>

  <!-- State 5: Repeat customer -->
  <rect x="1032" y="756" width="202" height="80" rx="10" fill="#1A102D" stroke="#A855F7" stroke-width="1"/>
  <text x="1133" y="778" fill="#A855F7" font-size="14" font-weight="700" text-anchor="middle">👤 Loyalty Match</text>
  <text x="1133" y="798" fill="#94A3B8" font-size="12" text-anchor="middle">DOB on profile</text>
  <text x="1133" y="814" fill="#A855F7" font-size="12" text-anchor="middle">Auto-verified</text>
  <rect x="1040" y="820" width="186" height="24" rx="6" fill="#1A102D" stroke="#A855F7" stroke-width="1"/>
  <text x="1133" y="836" fill="#A855F7" font-size="12" text-anchor="middle">Skip scan · Auto-pass</text>

  <!-- Screen label -->
  <text x="683" y="1018" fill="#0F1117" font-size="11" text-anchor="middle">Synalux POS — Age Verification / ID Scan (MVP · iOS Vision PDF417 + Manual DOB · 1366×1024)</text>
</svg>
