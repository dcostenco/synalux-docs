  <text x="1216" y="326" font-size="9" fill="#6B7280">GC-1120 · 2026-05-27 11:30 AM</text>
  <text x="1216" y="338" font-size="9" fill="#6B7280">Cashier: Maria</text>

  <rect x="1204" y="346" width="212" height="48" rx="4" fill="#0F1117"/>
  <text x="1216" y="366" font-size="10" fill="#EF4444">− $100.00 REDEEMED</text>
  <text x="1216" y="380" font-size="9" fill="#6B7280">GC-0930 · 2026-05-27 10:15 AM</text>
  <text x="1216" y="392" font-size="9" fill="#6B7280">Online order #1822</text>

  <rect x="1204" y="400" width="212" height="48" rx="4" fill="#0F1117"/>
  <text x="1216" y="420" font-size="10" fill="#10B981">+ $100.00 ISSUED</text>
  <text x="1216" y="434" font-size="9" fill="#6B7280">GC-0930 · 2026-05-26</text>
  <text x="1216" y="446" font-size="9" fill="#6B7280">Birthday gift package</text>

  <!-- Config section -->
