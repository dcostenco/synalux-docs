  <text x="640" y="778" font-size="11" fill="#D1D5DB">No expiry (recommended) or custom date</text>
  <text x="640" y="796" font-size="11" fill="#D1D5DB">Inactivity fee: allowed in some states (off)</text>
  <text x="640" y="814" font-size="11" fill="#D1D5DB">Liability account: tracked in pos_gc_liability</text>

  <rect x="1016" y="736" width="380" height="120" rx="6" fill="#0F1117" stroke="#374151" stroke-width="1"/>
