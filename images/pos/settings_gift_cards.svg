  <text x="1036" y="778" font-size="10" fill="#D1D5DB">Register: "Gift Card" tender button → scan/type card</text>
  <text x="1036" y="794" font-size="10" fill="#D1D5DB">Online: gift card code entry at checkout</text>
  <text x="1036" y="810" font-size="10" fill="#D1D5DB">Reports: liability report + redemption report</text>
  <text x="1036" y="826" font-size="10" fill="#D1D5DB">SMS delivery via Twilio when digital card issued</text>

  <text x="720" y="886" font-size="11" text-anchor="middle" fill="#4B5563">Synalux POS · Gift Cards · pos_gift_cards — physical + digital · Twilio SMS · liability tracking</text>
