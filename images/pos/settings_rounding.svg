<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="system-ui,-apple-system,sans-serif">
  <rect width="1440" height="900" fill="#0F1117"/>
  <!-- Left Nav -->
  <rect x="0" y="0" width="200" height="900" fill="#13162A"/>
  <text x="16" y="30" font-size="13" font-weight="700" fill="#F59E0B">⚙ Back Office</text>
  <text x="16" y="67" font-size="12" fill="#8B92A5">Gift Cards</text>
  <text x="16" y="103" font-size="12" fill="#8B92A5">Loyalty</text>
  <text x="16" y="139" font-size="12" fill="#8B92A5">Menu Scheduling</text>
  <rect x="0" y="152" width="200" height="36" fill="#1E2240" rx="4"/>
  <rect x="0" y="152" width="3" height="36" fill="#F59E0B"/>
  <text x="16" y="175" font-size="12" font-weight="600" fill="#F59E0B">Rounding</text>
  <text x="16" y="211" font-size="12" fill="#8B92A5">Cash Management</text>
  <text x="16" y="247" font-size="12" fill="#8B92A5">Taxes</text>
  <text x="16" y="283" font-size="12" fill="#8B92A5">Payments</text>
  <text x="16" y="319" font-size="12" fill="#8B92A5">Reports</text>

  <!-- Header -->
  <rect x="200" y="0" width="1240" height="56" fill="#1A1D2E"/>
  <text x="220" y="34" font-size="18" font-weight="700" fill="#FFFFFF">Cash Rounding Settings</text>
  <text x="220" y="50" font-size="11" fill="#8B92A5">Canadian nickel rounding · US optional cash rounding · Card transactions always charge exact amount</text>

  <!-- Key principle banner -->
  <rect x="220" y="72" width="1200" height="52" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <text x="244" y="96" font-size="13" font-weight="700" fill="#93C5FD">Rounding applies to CASH transactions only.</text>
  <text x="244" y="114" font-size="11" fill="#D1D5DB">Card, gift card, and mobile payments always charge the exact calculated total. Rounding is a separate line item on the receipt.</text>

  <!-- ===== Canadian Section ===== -->
  <rect x="220" y="140" width="590" height="520" rx="8" fill="#1A1D2E"/>

  <!-- Canada flag emoji + title -->
  <text x="244" y="178" font-size="22">🍁</text>
  <text x="280" y="174" font-size="16" font-weight="700" fill="#FFFFFF">Canadian Penny Rounding</text>
  <text x="280" y="192" font-size="11" fill="#8B92A5">Canada eliminated the 1¢ coin February 2013. Required for CAD locations.</text>

  <!-- Enable toggle -->
  <rect x="244" y="204" width="546" height="44" rx="6" fill="#0F1117" stroke="#374151" stroke-width="1"/>
  <text x="264" y="224" font-size="13" font-weight="600" fill="#FFFFFF">Enable CAD Nickel Rounding</text>
  <text x="264" y="240" font-size="10" fill="#6B7280">pos_config.cad_rounding_enabled — auto-on when location currency = CAD</text>
  <rect x="738" y="214" width="44" height="24" rx="12" fill="#10B981"/>
  <circle cx="770" cy="226" r="10" fill="#FFFFFF"/>

  <!-- Rounding table -->
  <text x="244" y="274" font-size="11" font-weight="600" fill="#8B92A5">ROUNDING TABLE (Canada Revenue Agency standard)</text>
  <rect x="244" y="282" width="546" height="220" rx="6" fill="#0F1117"/>

  <!-- Headers -->
  <rect x="252" y="290" width="530" height="28" fill="#13162A"/>
  <text x="268" y="308" font-size="10" font-weight="600" fill="#6B7280">CENTS ENDING IN</text>
  <text x="440" y="308" font-size="10" font-weight="600" fill="#6B7280">DIRECTION</text>
  <text x="568" y="308" font-size="10" font-weight="600" fill="#6B7280">EXAMPLE</text>
  <text x="700" y="308" font-size="10" font-weight="600" fill="#6B7280">RESULT</text>

  <!-- Rows -->
  <rect x="252" y="318" width="530" height="28" fill="#1A1D2E"/>
  <text x="268" y="336" font-size="12" fill="#D1D5DB">0, 5</text>
  <text x="440" y="336" font-size="12" fill="#8B92A5">No change</text>
  <text x="568" y="336" font-size="12" fill="#6B7280">$4.50, $4.55</text>
  <text x="700" y="336" font-size="12" fill="#FFFFFF">Exact</text>
  <rect x="252" y="346" width="530" height="28" fill="#13162A"/>
  <text x="268" y="364" font-size="12" fill="#D1D5DB">1, 2</text>
  <text x="440" y="364" font-size="12" fill="#10B981">Round DOWN ↓</text>
  <text x="568" y="364" font-size="12" fill="#6B7280">$4.51, $4.52</text>
  <text x="700" y="364" font-size="12" fill="#10B981">→ $4.50</text>
  <rect x="252" y="374" width="530" height="28" fill="#1A1D2E"/>
  <text x="268" y="392" font-size="12" fill="#D1D5DB">3, 4</text>
  <text x="440" y="392" font-size="12" fill="#F59E0B">Round UP ↑</text>
  <text x="568" y="392" font-size="12" fill="#6B7280">$4.53, $4.54</text>
  <text x="700" y="392" font-size="12" fill="#F59E0B">→ $4.55</text>
  <rect x="252" y="402" width="530" height="28" fill="#13162A"/>
  <text x="268" y="420" font-size="12" fill="#D1D5DB">6, 7</text>
  <text x="440" y="420" font-size="12" fill="#10B981">Round DOWN ↓</text>
  <text x="568" y="420" font-size="12" fill="#6B7280">$4.56, $4.57</text>
  <text x="700" y="420" font-size="12" fill="#10B981">→ $4.55</text>
  <rect x="252" y="430" width="530" height="28" fill="#1A1D2E"/>
  <text x="268" y="448" font-size="12" fill="#D1D5DB">8, 9</text>
  <text x="440" y="448" font-size="12" fill="#F59E0B">Round UP ↑</text>
  <text x="568" y="448" font-size="12" fill="#6B7280">$4.58, $4.59</text>
  <text x="700" y="448" font-size="12" fill="#F59E0B">→ $4.60</text>
  <rect x="252" y="458" width="530" height="28" fill="#13162A"/>
  <text x="268" y="476" font-size="12" fill="#6B7280">0 (nice dollar)</text>
  <text x="440" y="476" font-size="12" fill="#8B92A5">No change</text>
  <text x="568" y="476" font-size="12" fill="#6B7280">$5.00</text>
  <text x="700" y="476" font-size="12" fill="#FFFFFF">Exact</text>

  <!-- CAD receipt preview -->
  <text x="244" y="524" font-size="11" font-weight="600" fill="#8B92A5">RECEIPT LINE PREVIEW (CAD cash)</text>
  <rect x="244" y="530" width="546" height="100" rx="6" fill="#0F1117" stroke="#374151" stroke-width="1"/>
  <text x="264" y="552" font-size="11" fill="#D1D5DB">Subtotal                   $24.53</text>
  <text x="264" y="568" font-size="11" fill="#D1D5DB">GST (5%)                   $1.23</text>
  <text x="264" y="584" font-size="11" fill="#D1D5DB">QST (9.975%)               $2.57</text>
  <text x="264" y="600" font-size="11" fill="#10B981">Cash Rounding              −$0.03</text>
  <rect x="264" y="606" width="510" height="1" fill="#374151"/>
  <text x="264" y="622" font-size="13" font-weight="700" fill="#FFFFFF">Cash Total                 $28.30</text>

  <!-- ===== US Section ===== -->
  <rect x="830" y="140" width="590" height="520" rx="8" fill="#1A1D2E"/>

  <text x="854" y="178" font-size="22">🦅</text>
  <text x="890" y="174" font-size="16" font-weight="700" fill="#FFFFFF">US Cash Rounding (Optional)</text>
  <text x="890" y="192" font-size="11" fill="#8B92A5">US still uses pennies. Some businesses opt-in to reduce coin handling.</text>

  <!-- Warning -->
  <rect x="854" y="204" width="546" height="44" rx="6" fill="#7C2D12" stroke="#991B1B" stroke-width="1"/>
  <text x="874" y="224" font-size="11" font-weight="600" fill="#FCA5A5">⚠ Not required in US — optional business decision</text>
  <text x="874" y="240" font-size="10" fill="#FCA5A5">Customer-facing signage required. Consult your state regulations before enabling.</text>

  <!-- Enable toggle -->
  <rect x="854" y="260" width="546" height="44" rx="6" fill="#0F1117" stroke="#374151" stroke-width="1"/>
  <text x="874" y="280" font-size="13" font-weight="600" fill="#FFFFFF">Enable US Cash Rounding</text>
  <text x="874" y="296" font-size="10" fill="#6B7280">pos_config.us_rounding_enabled — disabled by default</text>
  <rect x="1348" y="270" width="44" height="24" rx="12" fill="#374151"/>
  <circle cx="1360" cy="282" r="10" fill="#FFFFFF"/>

  <!-- Rounding mode -->
  <text x="854" y="330" font-size="11" font-weight="600" fill="#8B92A5">ROUNDING MODE (when enabled)</text>
  <rect x="854" y="338" width="546" height="60" rx="6" fill="#0F1117"/>
  <rect x="862" y="346" width="174" height="44" rx="6" fill="#F59E0B"/>
  <text x="890" y="366" font-size="12" font-weight="600" fill="#000">Nearest 5¢</text>
  <text x="890" y="382" font-size="10" fill="#7C3A00">Standard</text>
  <rect x="1044" y="346" width="174" height="44" rx="6" fill="#1E2240" stroke="#374151" stroke-width="1"/>
  <text x="1068" y="366" font-size="12" fill="#6B7280">Nearest 10¢</text>
  <text x="1068" y="382" font-size="10" fill="#4B5563">Less common</text>
  <rect x="1226" y="346" width="166" height="44" rx="6" fill="#1E2240" stroke="#374151" stroke-width="1"/>
  <text x="1248" y="366" font-size="12" fill="#6B7280">Always round up</text>
  <text x="1248" y="382" font-size="10" fill="#4B5563">Merchant favor</text>

  <!-- US rounding table -->
  <text x="854" y="428" font-size="11" font-weight="600" fill="#8B92A5">ROUNDING TABLE (nearest 5¢ — symmetric)</text>
  <rect x="854" y="436" width="546" height="164" rx="6" fill="#0F1117"/>
  <rect x="862" y="444" width="530" height="28" fill="#13162A"/>
  <text x="878" y="462" font-size="10" font-weight="600" fill="#6B7280">CENTS</text>
  <text x="1000" y="462" font-size="10" font-weight="600" fill="#6B7280">ROUNDS TO</text>
  <text x="1140" y="462" font-size="10" font-weight="600" fill="#6B7280">ADJUSTMENT</text>
  <text x="1280" y="462" font-size="10" font-weight="600" fill="#6B7280">EXAMPLE</text>

  <rect x="862" y="472" width="530" height="24" fill="#1A1D2E"/>
  <text x="878" y="488" font-size="11" fill="#D1D5DB">00–02</text>
  <text x="1000" y="488" font-size="11" fill="#10B981">Round down → ×.00</text>
  <text x="1140" y="488" font-size="11" fill="#10B981">−$0.01–$0.02</text>
  <text x="1280" y="488" font-size="11" fill="#6B7280">$4.51 → $4.50</text>
  <rect x="862" y="496" width="530" height="24" fill="#13162A"/>
  <text x="878" y="512" font-size="11" fill="#D1D5DB">03–07</text>
  <text x="1000" y="512" font-size="11" fill="#F59E0B">Round → ×.05</text>
  <text x="1140" y="512" font-size="11" fill="#F59E0B">+/−$0.02</text>
  <text x="1280" y="512" font-size="11" fill="#6B7280">$4.53 → $4.55</text>
  <rect x="862" y="520" width="530" height="24" fill="#1A1D2E"/>
  <text x="878" y="536" font-size="11" fill="#D1D5DB">08–12</text>
  <text x="1000" y="536" font-size="11" fill="#10B981">Round down → ×.10</text>
  <text x="1140" y="536" font-size="11" fill="#10B981">−$0.01–$0.02</text>
  <text x="1280" y="536" font-size="11" fill="#6B7280">$4.59 → $4.60</text>
  <rect x="862" y="544" width="530" height="24" fill="#13162A"/>
  <text x="878" y="560" font-size="11" fill="#D1D5DB">exact ×.00 or ×.05</text>
  <text x="1000" y="560" font-size="11" fill="#8B92A5">No change</text>
  <text x="1140" y="560" font-size="11" fill="#8B92A5">$0.00</text>
  <text x="1280" y="560" font-size="11" fill="#6B7280">$4.50 → $4.50</text>
  <rect x="862" y="568" width="530" height="28" fill="#1A1D2E"/>
  <text x="878" y="586" font-size="10" fill="#6B7280">Rounding NEVER applies to card, digital, or online payments</text>

  <!-- US receipt preview -->
  <text x="854" y="622" font-size="11" font-weight="600" fill="#8B92A5">RECEIPT LINE PREVIEW (US cash)</text>
  <rect x="854" y="628" width="546" height="100" rx="6" fill="#0F1117" stroke="#374151" stroke-width="1"/>
  <text x="874" y="650" font-size="11" fill="#D1D5DB">Subtotal                   $21.53</text>
  <text x="874" y="666" font-size="11" fill="#D1D5DB">CA State Tax (6.25%)        $1.35</text>
  <text x="874" y="682" font-size="11" fill="#D1D5DB">LA County (1.00%)           $0.22</text>
  <text x="874" y="698" font-size="11" fill="#F59E0B">Cash Rounding              +$0.02</text>
  <rect x="874" y="704" width="510" height="1" fill="#374151"/>
  <text x="874" y="720" font-size="13" font-weight="700" fill="#FFFFFF">Cash Total                 $23.12</text>

  <!-- Workflow notes at bottom -->
  <rect x="220" y="676" width="1200" height="100" rx="8" fill="#1E2240" stroke="#374151" stroke-width="1"/>
  <text x="244" y="700" font-size="12" font-weight="700" fill="#FFFFFF">Workflow Integration</text>
  <text x="244" y="720" font-size="11" fill="#D1D5DB">• Rounding calculated at payment time — only triggers when tender type = Cash</text>
  <text x="244" y="736" font-size="11" fill="#D1D5DB">• Rounding amount stored in pos_payments.rounding_cents (positive = up, negative = down)</text>
  <text x="244" y="752" font-size="11" fill="#D1D5DB">• EOD report shows total rounding gain/loss — reconciles against cash drawer count</text>
  <text x="244" y="768" font-size="11" fill="#D1D5DB">• Rounding line appears on receipt with label from pos_config.rounding_label (e.g., "Cash Rounding" / "Arrondissement")</text>

  <text x="720" y="790" font-size="11" text-anchor="middle" fill="#4B5563">Synalux POS · Rounding · pos_config.cad_rounding_enabled / us_rounding_enabled · cash only</text>
</svg>
