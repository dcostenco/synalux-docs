<svg role="img" aria-labelledby="title-settings_rounding-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1366 1024" font-family="-apple-system,system-ui,BlinkMacSystemFont,sans-serif">
  <title id="title-settings_rounding-svg">Synalux POS — rounding</title>
  <desc>Synalux POS mockup screen for rounding. All UI elements admin-configurable.</desc>
  <defs>
    <!-- Gradients -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2235"/>
      <stop offset="100%" stop-color="#1A1D2E"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2337"/>
      <stop offset="100%" stop-color="#1A1D2E"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>

    <!-- Admin gear icon -->
    <symbol id="gear" viewBox="0 0 16 16">
      <path d="M8 1l1.2.3.5 1.3.9-.6 1.2.7-.2 1.4 1.1.8-.6 1.2L13.4 7l.3 1.2-1.1.8.2 1.4-1.2.7-.9-.6-.5 1.3L8 12l-1.2-.3-.5-1.3-.9.6-1.2-.7.2-1.4-1.1-.8.6-1.2L2.6 7l-.3-1.2 1.1-.8-.2-1.4 1.2-.7.9.6.5-1.3z" fill="none" stroke="#F59E0B" stroke-width="1"/>
      <circle cx="8" cy="7" r="2" fill="none" stroke="#F59E0B" stroke-width="1"/>
    </symbol>

    <!-- Toggle ON -->
    <symbol id="toggleOn" viewBox="0 0 44 24">
      <rect width="44" height="24" rx="12" fill="#22C55E"/>
      <circle cx="34" cy="12" r="10" fill="#FFFFFF"/>
    </symbol>

    <!-- Toggle OFF -->
    <symbol id="toggleOff" viewBox="0 0 44 24">
      <rect width="44" height="24" rx="12" fill="#374151"/>
      <circle cx="10" cy="12" r="10" fill="#FFFFFF"/>
    </symbol>

    <!-- Nav item -->
    <symbol id="navItem" viewBox="0 0 184 36">
      <rect width="184" height="36" rx="6" fill="#1E2235"/>
    </symbol>

    <!-- Table row even -->
    <symbol id="rowEven" viewBox="0 0 530 28">
      <rect width="530" height="28" fill="#1A1D2E"/>
    </symbol>
    <!-- Table row odd -->
    <symbol id="rowOdd" viewBox="0 0 530 28">
      <rect width="530" height="28" fill="#11142A"/>
    </symbol>

    <!-- Rounding mode button (selected) -->
    <symbol id="modeSelected" viewBox="0 0 174 44">
      <rect width="174" height="44" rx="6" fill="url(#amberGrad)"/>
    </symbol>
    <!-- Rounding mode button (unselected) -->
    <symbol id="modeUnselected" viewBox="0 0 174 44">
      <rect width="174" height="44" rx="6" fill="#1E2235" stroke="#374151" stroke-width="1"/>
    </symbol>

    <!-- Receipt line container -->
    <symbol id="receiptBox" viewBox="0 0 530 100">
      <rect width="530" height="100" rx="6" fill="#0C0E1A" stroke="#374151" stroke-width="1"/>
    </symbol>
  </defs>

  <!-- ===== CANVAS ===== -->
  <rect width="1366" height="1024" fill="#0C0E1A"/>

  <!-- ===== LEFT NAV SIDEBAR ===== -->
  <rect x="0" y="0" width="200" height="1024" fill="#11142A"/>
  <rect x="200" y="0" width="1" height="1024" fill="#2A2E45"/>
  <text x="16" y="30" font-size="13" font-weight="700" fill="#F59E0B">Back Office</text>

  <!-- Nav items -->
  <text x="16" y="67" font-size="12" fill="#94A3B8">Gift Cards</text>
  <text x="16" y="103" font-size="12" fill="#94A3B8">Loyalty</text>
  <text x="16" y="139" font-size="12" fill="#94A3B8">Menu Scheduling</text>
  <!-- Active nav -->
  <rect x="0" y="152" width="200" height="36" fill="#1E2235" rx="4"/>
  <rect x="0" y="152" width="3" height="36" fill="#F59E0B"/>
  <text x="16" y="175" font-size="12" font-weight="600" fill="#F59E0B">Rounding</text>
  <text x="16" y="211" font-size="12" fill="#94A3B8">Cash Management</text>
  <text x="16" y="247" font-size="12" fill="#94A3B8">Taxes</text>
  <text x="16" y="283" font-size="12" fill="#94A3B8">Payments</text>
  <text x="16" y="319" font-size="12" fill="#94A3B8">Reports</text>

  <!-- ===== HEADER ===== -->
  <rect x="201" y="0" width="1165" height="56" fill="url(#headerGrad)"/>
  <rect x="201" y="56" width="1165" height="1" fill="#2A2E45"/>
  <text x="220" y="34" font-size="18" font-weight="700" fill="#FFFFFF">Cash Rounding Settings</text>
  <!-- DB: pos_config.cad_rounding_enabled, pos_config.us_rounding_enabled -->
  <text x="220" y="50" font-size="11" fill="#94A3B8">Canadian nickel rounding | US optional cash rounding | Card transactions always charge exact amount</text>
  <use href="#gear" x="1330" y="18" width="16" height="16"/>

  <!-- Key principle banner -->
  <rect x="220" y="72" width="1126" height="52" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
  <text x="244" y="96" font-size="13" font-weight="700" fill="#93C5FD">Rounding applies to CASH transactions only.</text>
  <text x="244" y="114" font-size="11" fill="#CBD5E1">Card, gift card, and mobile payments always charge the exact calculated total. Rounding is a separate line item on the receipt.</text>

  <!-- ===== Canadian Section (left panel) ===== -->
  <!-- DB: pos_config.cad_rounding_enabled -->
  <rect x="220" y="140" width="550" height="520" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>

  <text x="244" y="174" font-size="16" font-weight="700" fill="#FFFFFF">Canadian Penny Rounding</text>
  <text x="244" y="192" font-size="11" fill="#94A3B8">Canada eliminated the 1c coin February 2013. Required for CAD locations.</text>

  <!-- Enable toggle (editable) -->
  <rect x="244" y="204" width="506" height="44" rx="6" fill="#0C0E1A" stroke="#374151" stroke-width="1"/>
  <text x="264" y="224" font-size="13" font-weight="600" fill="#FFFFFF">Enable CAD Nickel Rounding</text>
  <!-- DB: pos_config.cad_rounding_enabled — auto-on when location currency = CAD -->
  <text x="264" y="240" font-size="10" fill="#64748B">pos_config.cad_rounding_enabled — auto-on when currency = CAD</text>
  <use href="#gear" x="700" y="216" width="14" height="14"/>
  <use href="#toggleOn" x="718" y="214" width="44" height="24"/>

  <!-- Rounding table -->
  <!-- DB: Standard CRA rounding rules, no admin override needed -->
  <text x="244" y="274" font-size="11" font-weight="600" fill="#94A3B8">ROUNDING TABLE (Canada Revenue Agency standard)</text>
  <rect x="244" y="282" width="506" height="220" rx="6" fill="#0C0E1A"/>

  <!-- Headers -->
  <rect x="252" y="290" width="490" height="28" fill="#11142A"/>
  <text x="268" y="308" font-size="10" font-weight="600" fill="#64748B">CENTS ENDING IN</text>
  <text x="400" y="308" font-size="10" font-weight="600" fill="#64748B">DIRECTION</text>
  <text x="510" y="308" font-size="10" font-weight="600" fill="#64748B">EXAMPLE</text>
  <text x="640" y="308" font-size="10" font-weight="600" fill="#64748B">RESULT</text>

  <!-- Row: 0, 5 -->
  <use href="#rowEven" x="252" y="318" width="490" height="28"/>
  <text x="268" y="336" font-size="12" fill="#CBD5E1">0, 5</text>
  <text x="400" y="336" font-size="12" fill="#94A3B8">No change</text>
  <text x="510" y="336" font-size="12" fill="#64748B">$4.50, $4.55</text>
  <text x="640" y="336" font-size="12" fill="#FFFFFF">Exact</text>

  <!-- Row: 1, 2 -->
  <use href="#rowOdd" x="252" y="346" width="490" height="28"/>
  <text x="268" y="364" font-size="12" fill="#CBD5E1">1, 2</text>
  <text x="400" y="364" font-size="12" fill="#22C55E">Round DOWN</text>
  <text x="510" y="364" font-size="12" fill="#64748B">$4.51, $4.52</text>
  <text x="640" y="364" font-size="12" fill="#22C55E">$4.50</text>

  <!-- Row: 3, 4 -->
  <use href="#rowEven" x="252" y="374" width="490" height="28"/>
  <text x="268" y="392" font-size="12" fill="#CBD5E1">3, 4</text>
  <text x="400" y="392" font-size="12" fill="#F59E0B">Round UP</text>
  <text x="510" y="392" font-size="12" fill="#64748B">$4.53, $4.54</text>
  <text x="640" y="392" font-size="12" fill="#F59E0B">$4.55</text>

  <!-- Row: 6, 7 -->
  <use href="#rowOdd" x="252" y="402" width="490" height="28"/>
  <text x="268" y="420" font-size="12" fill="#CBD5E1">6, 7</text>
  <text x="400" y="420" font-size="12" fill="#22C55E">Round DOWN</text>
  <text x="510" y="420" font-size="12" fill="#64748B">$4.56, $4.57</text>
  <text x="640" y="420" font-size="12" fill="#22C55E">$4.55</text>

  <!-- Row: 8, 9 -->
  <use href="#rowEven" x="252" y="430" width="490" height="28"/>
  <text x="268" y="448" font-size="12" fill="#CBD5E1">8, 9</text>
  <text x="400" y="448" font-size="12" fill="#F59E0B">Round UP</text>
  <text x="510" y="448" font-size="12" fill="#64748B">$4.58, $4.59</text>
  <text x="640" y="448" font-size="12" fill="#F59E0B">$4.60</text>

  <!-- Row: 0 nice dollar -->
  <use href="#rowOdd" x="252" y="458" width="490" height="28"/>
  <text x="268" y="476" font-size="12" fill="#64748B">0 (nice dollar)</text>
  <text x="400" y="476" font-size="12" fill="#94A3B8">No change</text>
  <text x="510" y="476" font-size="12" fill="#64748B">$5.00</text>
  <text x="640" y="476" font-size="12" fill="#FFFFFF">Exact</text>

  <!-- CAD receipt preview -->
  <!-- DB: pos_config.rounding_label -->
  <text x="244" y="524" font-size="11" font-weight="600" fill="#94A3B8">RECEIPT LINE PREVIEW (CAD cash)</text>
  <use href="#receiptBox" x="244" y="530" width="506" height="100"/>
  <text x="264" y="552" font-size="11" fill="#CBD5E1">Subtotal                   $24.53</text>
  <text x="264" y="568" font-size="11" fill="#CBD5E1">GST (5%)                   $1.23</text>
  <text x="264" y="584" font-size="11" fill="#CBD5E1">QST (9.975%)               $2.57</text>
  <!-- DB: pos_payments.rounding_cents (negative = down) -->
  <text x="264" y="600" font-size="11" fill="#22C55E">Cash Rounding              -$0.03</text>
  <rect x="264" y="606" width="470" height="1" fill="#374151"/>
  <text x="264" y="622" font-size="13" font-weight="700" fill="#FFFFFF">Cash Total                 $28.30</text>

  <!-- ===== US Section (right panel) ===== -->
  <!-- DB: pos_config.us_rounding_enabled -->
  <rect x="790" y="140" width="556" height="520" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>

  <text x="814" y="174" font-size="16" font-weight="700" fill="#FFFFFF">US Cash Rounding (Optional)</text>
  <text x="814" y="192" font-size="11" fill="#94A3B8">US still uses pennies. Some businesses opt-in to reduce coin handling.</text>

  <!-- Warning -->
  <rect x="814" y="204" width="512" height="44" rx="6" fill="#7C2D12" stroke="#991B1B" stroke-width="1"/>
  <text x="834" y="224" font-size="11" font-weight="600" fill="#FCA5A5">Not required in US — optional business decision</text>
  <text x="834" y="240" font-size="10" fill="#FCA5A5">Customer-facing signage required. Consult your state regulations before enabling.</text>

  <!-- Enable toggle (editable) -->
  <rect x="814" y="260" width="512" height="44" rx="6" fill="#0C0E1A" stroke="#374151" stroke-width="1"/>
  <text x="834" y="280" font-size="13" font-weight="600" fill="#FFFFFF">Enable US Cash Rounding</text>
  <!-- DB: pos_config.us_rounding_enabled — disabled by default -->
  <text x="834" y="296" font-size="10" fill="#64748B">pos_config.us_rounding_enabled — disabled by default</text>
  <use href="#gear" x="1270" y="270" width="14" height="14"/>
  <use href="#toggleOff" x="1288" y="270" width="44" height="24"/>

  <!-- Rounding mode (editable) -->
  <!-- DB: pos_config.us_rounding_mode ('nearest_5', 'nearest_10', 'always_up') -->
  <text x="814" y="330" font-size="11" font-weight="600" fill="#94A3B8">ROUNDING MODE (when enabled)</text>
  <use href="#gear" x="990" y="320" width="12" height="12"/>
  <rect x="814" y="338" width="512" height="60" rx="6" fill="#0C0E1A"/>
  <use href="#modeSelected" x="822" y="346" width="158" height="44"/>
  <text x="856" y="366" font-size="12" font-weight="600" fill="#000">Nearest 5c</text>
  <text x="856" y="382" font-size="10" fill="#7C3A00">Standard</text>
  <use href="#modeUnselected" x="988" y="346" width="158" height="44"/>
  <text x="1016" y="366" font-size="12" fill="#64748B">Nearest 10c</text>
  <text x="1016" y="382" font-size="10" fill="#475569">Less common</text>
  <use href="#modeUnselected" x="1154" y="346" width="158" height="44"/>
  <text x="1178" y="366" font-size="12" fill="#64748B">Always round up</text>
  <text x="1178" y="382" font-size="10" fill="#475569">Merchant favor</text>

  <!-- US rounding table -->
  <text x="814" y="428" font-size="11" font-weight="600" fill="#94A3B8">ROUNDING TABLE (nearest 5c — symmetric)</text>
  <rect x="814" y="436" width="512" height="164" rx="6" fill="#0C0E1A"/>
  <rect x="822" y="444" width="496" height="28" fill="#11142A"/>
  <text x="838" y="462" font-size="10" font-weight="600" fill="#64748B">CENTS</text>
  <text x="948" y="462" font-size="10" font-weight="600" fill="#64748B">ROUNDS TO</text>
  <text x="1088" y="462" font-size="10" font-weight="600" fill="#64748B">ADJUSTMENT</text>
  <text x="1228" y="462" font-size="10" font-weight="600" fill="#64748B">EXAMPLE</text>

  <use href="#rowEven" x="822" y="472" width="496" height="24"/>
  <text x="838" y="488" font-size="11" fill="#CBD5E1">00-02</text>
  <text x="948" y="488" font-size="11" fill="#22C55E">Round down</text>
  <text x="1088" y="488" font-size="11" fill="#22C55E">-$0.01-$0.02</text>
  <text x="1228" y="488" font-size="11" fill="#64748B">$4.51 -&gt; $4.50</text>

  <use href="#rowOdd" x="822" y="496" width="496" height="24"/>
  <text x="838" y="512" font-size="11" fill="#CBD5E1">03-07</text>
  <text x="948" y="512" font-size="11" fill="#F59E0B">Round to x.05</text>
  <text x="1088" y="512" font-size="11" fill="#F59E0B">+/-$0.02</text>
  <text x="1228" y="512" font-size="11" fill="#64748B">$4.53 -&gt; $4.55</text>

  <use href="#rowEven" x="822" y="520" width="496" height="24"/>
  <text x="838" y="536" font-size="11" fill="#CBD5E1">08-12</text>
  <text x="948" y="536" font-size="11" fill="#22C55E">Round down</text>
  <text x="1088" y="536" font-size="11" fill="#22C55E">-$0.01-$0.02</text>
  <text x="1228" y="536" font-size="11" fill="#64748B">$4.59 -&gt; $4.60</text>

  <use href="#rowOdd" x="822" y="544" width="496" height="24"/>
  <text x="838" y="560" font-size="11" fill="#CBD5E1">exact x.00 or x.05</text>
  <text x="948" y="560" font-size="11" fill="#94A3B8">No change</text>
  <text x="1088" y="560" font-size="11" fill="#94A3B8">$0.00</text>
  <text x="1228" y="560" font-size="11" fill="#64748B">$4.50 -&gt; $4.50</text>

  <rect x="822" y="568" width="496" height="28" fill="#1A1D2E"/>
  <text x="838" y="586" font-size="10" fill="#64748B">Rounding NEVER applies to card, digital, or online payments</text>

  <!-- US receipt preview -->
  <text x="814" y="622" font-size="11" font-weight="600" fill="#94A3B8">RECEIPT LINE PREVIEW (US cash)</text>
  <use href="#receiptBox" x="814" y="628" width="512" height="100"/>
  <text x="834" y="650" font-size="11" fill="#CBD5E1">Subtotal                   $21.53</text>
  <text x="834" y="666" font-size="11" fill="#CBD5E1">CA State Tax (8.5%)         $1.84</text>
  <text x="834" y="682" font-size="11" fill="#CBD5E1">LA County (1.00%)           $0.22</text>
  <!-- DB: pos_payments.rounding_cents (positive = up) -->
  <text x="834" y="698" font-size="11" fill="#F59E0B">Cash Rounding              +$0.02</text>
  <rect x="834" y="704" width="476" height="1" fill="#374151"/>
  <text x="834" y="720" font-size="13" font-weight="700" fill="#FFFFFF">Cash Total                 $23.12</text>

  <!-- ===== Round-Up for Charity (bottom left) ===== -->
  <!-- DB: pos_config.charity_roundup_enabled, pos_config.charity_name -->
  <rect x="220" y="676" width="550" height="160" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="244" y="704" font-size="14" font-weight="700" fill="#FFFFFF">Round-Up for Charity</text>
  <use href="#gear" x="410" y="692" width="14" height="14"/>
  <text x="244" y="722" font-size="11" fill="#94A3B8">Ask customers to round up to next dollar for charity donation</text>

  <!-- Enable toggle (editable) -->
  <rect x="244" y="732" width="506" height="40" rx="6" fill="#0C0E1A" stroke="#374151" stroke-width="1"/>
  <text x="264" y="756" font-size="12" font-weight="600" fill="#FFFFFF">Enable Round-Up Prompt</text>
  <!-- DB: pos_config.charity_roundup_enabled -->
  <use href="#gear" x="695" y="744" width="12" height="12"/>
  <use href="#toggleOn" x="712" y="740" width="44" height="24"/>

  <!-- Charity name (editable) -->
  <rect x="244" y="780" width="506" height="40" rx="6" fill="#0C0E1A" stroke="#374151" stroke-width="1"/>
  <text x="264" y="798" font-size="11" fill="#94A3B8">Charity name:</text>
  <use href="#gear" x="346" y="789" width="12" height="12"/>
  <!-- DB: pos_config.charity_name -->
  <rect x="360" y="786" width="200" height="24" rx="4" fill="#1A1D2E" stroke="#F59E0B" stroke-width="1"/>
  <text x="374" y="803" font-size="12" fill="#FFFFFF">Local Food Bank</text>
  <text x="570" y="803" font-size="10" fill="#64748B">This month: $142.60 raised</text>

  <!-- ===== Display Format (bottom right) ===== -->
  <!-- DB: pos_config.rounding_label, pos_config.rounding_receipt_note -->
  <rect x="790" y="744" width="556" height="92" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="814" y="772" font-size="14" font-weight="700" fill="#FFFFFF">Display Format</text>
  <use href="#gear" x="930" y="760" width="14" height="14"/>

  <!-- Rounding label (editable) -->
  <text x="814" y="796" font-size="11" fill="#94A3B8">Receipt label:</text>
  <use href="#gear" x="900" y="787" width="12" height="12"/>
  <!-- DB: pos_config.rounding_label -->
  <rect x="916" y="783" width="180" height="24" rx="4" fill="#0C0E1A" stroke="#F59E0B" stroke-width="1"/>
  <text x="930" y="800" font-size="12" fill="#FFFFFF">Cash Rounding</text>
  <text x="1110" y="800" font-size="10" fill="#64748B">/ "Arrondissement" (fr)</text>

  <!-- ===== WORKFLOW / SAVE BAR ===== -->
  <!-- DB: pos_config, pos_payments.rounding_cents -->
  <rect x="220" y="852" width="1126" height="100" rx="8" fill="#1E2235" stroke="#374151" stroke-width="1"/>
  <text x="244" y="876" font-size="12" font-weight="700" fill="#FFFFFF">Workflow Integration</text>
  <text x="244" y="896" font-size="11" fill="#CBD5E1">Rounding calculated at payment time — only triggers when tender type = Cash</text>
  <!-- DB: pos_payments.rounding_cents -->
  <text x="244" y="912" font-size="11" fill="#CBD5E1">Rounding amount stored in pos_payments.rounding_cents (positive = up, negative = down)</text>
  <text x="244" y="928" font-size="11" fill="#CBD5E1">EOD report shows total rounding gain/loss — reconciles against cash drawer count</text>
  <text x="244" y="944" font-size="11" fill="#CBD5E1">Rounding line appears on receipt with label from pos_config.rounding_label</text>

  <!-- Save button -->
  <rect x="1186" y="964" width="160" height="36" rx="7" fill="url(#amberGrad)" filter="url(#shadow)"/>
  <text x="1266" y="986" fill="#0C0E1A" font-size="13" font-weight="700" text-anchor="middle">Save Changes</text>

  <!-- Footer -->
  <!-- DB: pos_config.cad_rounding_enabled, pos_config.us_rounding_enabled -->
  <text x="683" y="1014" font-size="11" text-anchor="middle" fill="#475569">Synalux POS | Rounding | pos_config.cad_rounding_enabled / us_rounding_enabled | cash only</text>

</svg>