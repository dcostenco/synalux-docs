  <!-- Workflow box -->
  <rect x="692" y="700" width="732" height="80" rx="6" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <text x="712" y="724" font-size="11" font-weight="600" fill="#93C5FD">Workflow Integration</text>
  <text x="712" y="742" font-size="10" fill="#D1D5DB">• Register auto-switches active menu at scheduled time — cashier sees banner "Breakfast Menu Active"</text>
  <text x="712" y="758" font-size="10" fill="#D1D5DB">• Online menu updates live — items outside schedule are hidden from customers automatically</text>
