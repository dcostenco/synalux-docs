  <rect x="708" y="562" width="100" height="22" rx="4" fill="#065F46"/>
  <text x="720" y="577" font-size="11" fill="#6EE7B7">Breakfast ✓</text>
  <rect x="816" y="562" width="72" height="22" rx="4" fill="#065F46"/>
  <text x="828" y="577" font-size="11" fill="#6EE7B7">Coffee ✓</text>
