<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="1200" height="900" fill="#0F1117"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#13162A"/>
  <rect x="0" y="60" width="1200" height="1" fill="#2D3050"/>

  <text x="24" y="37" fill="#F59E0B" font-size="16" font-weight="700">Synalux POS</text>
  <rect x="120" y="16" width="110" height="28" rx="6" fill="#1A102D"/>
  <text x="175" y="35" fill="#A855F7" font-size="13" font-weight="700" text-anchor="middle">🤖 AI Ordering</text>

  <text x="600" y="37" fill="#E2E8F0" font-size="16" font-weight="700" text-anchor="middle">AI-Powered Order Assistant</text>

  <rect x="1060" y="14" width="120" height="32" rx="6" fill="#1E2235"/>
  <text x="1120" y="35" fill="#94A3B8" font-size="13" text-anchor="middle">Table 4 · John S.</text>

  <!-- LEFT: Chat Interface -->
  <rect x="0" y="61" width="600" height="839" fill="#0F1117"/>
  <rect x="600" y="61" width="1" height="839" fill="#2D3050"/>

  <!-- Chat header -->
  <rect x="0" y="61" width="600" height="64" fill="#13162A"/>
  <rect x="0" y="125" width="600" height="1" fill="#2D3050"/>

  <circle cx="44" cy="93" r="24" fill="#7C3AED"/>
  <text x="44" y="100" fill="white" font-size="20" text-anchor="middle">🤖</text>
  <text x="78" y="88" fill="#E2E8F0" font-size="15" font-weight="700">Synalux AI</text>
  <text x="78" y="106" fill="#22C55E" font-size="12">● Online · Multilingual · 25 languages</text>

  <!-- Voice toggle -->
  <rect x="480" y="73" width="108" height="38" rx="8" fill="#1E2235"/>
  <text x="534" y="97" fill="#94A3B8" font-size="13" text-anchor="middle">🎙 Voice Mode</text>

  <!-- Chat messages -->
  <!-- AI message 1 -->
  <rect x="16" y="140" width="420" height="80" rx="16" rx2="4" fill="#1E2235"/>
  <text x="36" y="164" fill="#E2E8F0" font-size="14" font-weight="500">👋 Hi! I'm your Synalux AI assistant.</text>
  <text x="36" y="184" fill="#94A3B8" font-size="13">What can I get you today? I can help you</text>
  <text x="36" y="202" fill="#94A3B8" font-size="13">choose items, filter by diet, or take your order.</text>

  <!-- User message 1 -->
  <rect x="164" y="238" width="420" height="60" rx="16" fill="#7C3AED"/>
  <text x="184" y="263" fill="white" font-size="14">Something vegetarian, not too heavy,</text>
  <text x="184" y="281" fill="white" font-size="14">under $15 please</text>
  <text x="566" y="294" fill="#94A3B8" font-size="11" text-anchor="end">2:21 PM</text>

  <!-- AI message 2 - with suggestions -->
  <rect x="16" y="314" width="568" height="220" rx="16" rx2="4" fill="#1E2235"/>
  <text x="36" y="340" fill="#E2E8F0" font-size="14" font-weight="500">Great choice! 🌱 Here are 3 vegetarian options</text>
  <text x="36" y="360" fill="#94A3B8" font-size="13">under $15 that are light and popular today:</text>

  <!-- Suggestion cards within AI message -->
  <rect x="36" y="375" width="520" height="56" rx="10" fill="#13162A" stroke="#22C55E" stroke-width="1"/>
  <text x="56" y="398" fill="#22C55E" font-size="14">1.</text>
  <text x="76" y="396" fill="#E2E8F0" font-size="14" font-weight="600">Caesar Salad</text>
  <text x="76" y="414" fill="#64748B" font-size="12">Romaine · parmesan · homemade croutons · Caesar dressing</text>
  <text x="548" y="398" fill="#F59E0B" font-size="14" font-weight="700" text-anchor="end">$8.00</text>
  <rect x="490" y="406" width="68" height="22" rx="6" fill="#22C55E"/>
  <text x="524" y="420" fill="white" font-size="12" font-weight="700" text-anchor="middle">Add →</text>

  <rect x="36" y="438" width="520" height="56" rx="10" fill="#13162A"/>
  <text x="56" y="461" fill="#22C55E" font-size="14">2.</text>
  <text x="76" y="459" fill="#E2E8F0" font-size="14" font-weight="600">Mushroom Risotto</text>
  <text x="76" y="477" fill="#64748B" font-size="12">Arborio rice · wild mushrooms · parmesan · truffle oil</text>
  <text x="548" y="461" fill="#F59E0B" font-size="14" font-weight="700" text-anchor="end">$13.00</text>
  <rect x="490" y="469" width="68" height="22" rx="6" fill="#1E2235" stroke="#F59E0B" stroke-width="1"/>
  <text x="524" y="483" fill="#F59E0B" font-size="12" font-weight="700" text-anchor="middle">Add →</text>

  <rect x="36" y="500" width="520" height="22" rx="6" fill="#13162A"/>
  <text x="56" y="515" fill="#22C55E" font-size="14">3.</text>
  <text x="76" y="515" fill="#E2E8F0" font-size="14" font-weight="600">Avo Toast</text>
  <text x="548" y="515" fill="#F59E0B" font-size="14" font-weight="700" text-anchor="end">$11.00</text>

  <!-- User message 2 -->
  <rect x="214" y="550" width="370" height="44" rx="16" fill="#7C3AED"/>
  <text x="234" y="576" fill="white" font-size="14">I'll take the Caesar Salad please</text>
  <text x="566" y="590" fill="#94A3B8" font-size="11" text-anchor="end">2:22 PM</text>

  <!-- AI confirmation + upsell -->
  <rect x="16" y="610" width="500" height="130" rx="16" rx2="4" fill="#1E2235"/>
  <text x="36" y="636" fill="#22C55E" font-size="14" font-weight="600">✓ Added Caesar Salad to your order!</text>
  <text x="36" y="658" fill="#94A3B8" font-size="13">Would you like to add a drink to go with that?</text>
  <text x="36" y="678" fill="#94A3B8" font-size="13">Lemonade pairs really well with the Caesar. 🍋</text>

  <!-- Quick reply chips -->
  <rect x="36" y="694" width="100" height="32" rx="16" fill="#1A3320" stroke="#22C55E" stroke-width="1"/>
  <text x="86" y="714" fill="#22C55E" font-size="12" text-anchor="middle">Yes, add it</text>

  <rect x="144" y="694" width="80" height="32" rx="16" fill="#1E2235"/>
  <text x="184" y="714" fill="#94A3B8" font-size="12" text-anchor="middle">No thanks</text>

  <rect x="232" y="694" width="120" height="32" rx="16" fill="#1E2235"/>
  <text x="292" y="714" fill="#94A3B8" font-size="12" text-anchor="middle">See drink menu</text>

  <rect x="360" y="694" width="140" height="32" rx="16" fill="#1E2235"/>
  <text x="430" y="714" fill="#94A3B8" font-size="12" text-anchor="middle">That's everything</text>

  <!-- Typing indicator -->
  <rect x="16" y="755" width="100" height="36" rx="16" fill="#1E2235"/>
  <circle cx="48" cy="773" r="5" fill="#64748B"/>
  <circle cx="66" cy="773" r="5" fill="#64748B"/>
  <circle cx="84" cy="773" r="5" fill="#64748B"/>

  <!-- Input area -->
  <rect x="0" y="824" width="600" height="76" fill="#13162A"/>
  <rect x="0" y="824" width="600" height="1" fill="#2D3050"/>

  <rect x="16" y="836" width="504" height="44" rx="22" fill="#1E2235"/>
  <text x="36" y="862" fill="#64748B" font-size="14">Type a message or speak...</text>

  <!-- Voice button -->
  <rect x="528" y="836" width="44" height="44" rx="22" fill="#7C3AED"/>
  <text x="550" y="862" fill="white" font-size="20" text-anchor="middle">🎙</text>

  <!-- Send button -->
  <rect x="576" y="836" width="16" height="44" rx="8" fill="#F59E0B"/>

  <!-- RIGHT: Live Order Build + Context Panel -->
  <rect x="601" y="61" width="599" height="839" fill="#13162A"/>

  <!-- Order build header -->
  <text x="628" y="100" fill="#64748B" font-size="11" font-weight="700" letter-spacing="1">BUILDING ORDER — TABLE 4</text>

  <!-- Current order -->
  <rect x="616" y="110" width="568" height="250" rx="12" fill="#0F1117"/>

  <!-- Already added items -->
  <rect x="628" y="120" width="544" height="60" rx="8" fill="#1A1D2E"/>
  <text x="644" y="142" fill="#94A3B8" font-size="13">1×</text>
  <text x="666" y="142" fill="#E2E8F0" font-size="14" font-weight="600">Classic Burger</text>
  <text x="1154" y="142" fill="#F59E0B" font-size="14" font-weight="700" text-anchor="end">$12.00</text>
  <text x="666" y="162" fill="#64748B" font-size="12">No onions · Added via register</text>
  <text x="1154" y="162" fill="#60A5FA" font-size="12" text-anchor="end">Edit</text>

  <rect x="628" y="188" width="544" height="60" rx="8" fill="#1A1D2E"/>
  <text x="644" y="210" fill="#94A3B8" font-size="13">1×</text>
  <text x="666" y="210" fill="#E2E8F0" font-size="14" font-weight="600">Large Fries</text>
  <text x="1154" y="210" fill="#F59E0B" font-size="14" font-weight="700" text-anchor="end">$4.50</text>
  <text x="666" y="230" fill="#64748B" font-size="12">Added via register</text>

  <!-- NEW item from AI (highlighted) -->
  <rect x="628" y="256" width="544" height="60" rx="8" fill="#1A2D10" stroke="#22C55E" stroke-width="1"/>
  <rect x="628" y="256" width="6" height="60" rx="3" fill="#22C55E"/>
  <text x="644" y="278" fill="#94A3B8" font-size="13">1×</text>
  <text x="666" y="278" fill="#E2E8F0" font-size="14" font-weight="600">Caesar Salad</text>
  <text x="1154" y="278" fill="#F59E0B" font-size="14" font-weight="700" text-anchor="end">$8.00</text>
  <text x="666" y="298" fill="#22C55E" font-size="12">🤖 Just added via AI chat</text>
  <text x="1154" y="298" fill="#60A5FA" font-size="12" text-anchor="end">Customize</text>

  <!-- Totals in order area -->
  <rect x="628" y="324" width="544" height="1" fill="#2D3050"/>
  <text x="628" y="348" fill="#94A3B8" font-size="13">Subtotal</text>
  <text x="1172" y="348" fill="#E2E8F0" font-size="13" text-anchor="end">$24.50</text>
  <text x="628" y="372" fill="#94A3B8" font-size="13">Tax (8.5%)</text>
  <text x="1172" y="372" fill="#E2E8F0" font-size="13" text-anchor="end">$2.08</text>
  <rect x="628" y="382" width="544" height="1" fill="#2D3050"/>
  <text x="628" y="406" fill="#E2E8F0" font-size="16" font-weight="700">Total</text>
  <text x="1172" y="406" fill="#F59E0B" font-size="20" font-weight="700" text-anchor="end">$26.58</text>

  <!-- AI Features panel -->
  <rect x="616" y="430" width="568" height="300" rx="12" fill="#0F1117"/>
  <text x="636" y="458" fill="#64748B" font-size="11" font-weight="700" letter-spacing="1">AI ORDERING CAPABILITIES</text>

  <!-- Feature tiles -->
  <rect x="628" y="468" width="266" height="80" rx="10" fill="#1A102D"/>
  <text x="648" y="492" fill="#A855F7" font-size="20">🧠</text>
  <text x="680" y="492" fill="#E2E8F0" font-size="14" font-weight="600">Natural Language</text>
  <text x="648" y="512" fill="#94A3B8" font-size="12">Ask anything — diet, mood,</text>
  <text x="648" y="530" fill="#94A3B8" font-size="12">allergies, budget, cuisine type</text>

  <rect x="904" y="468" width="264" height="80" rx="10" fill="#102D1A"/>
  <text x="924" y="492" fill="#22C55E" font-size="20">🌍</text>
  <text x="956" y="492" fill="#E2E8F0" font-size="14" font-weight="600">25 Languages</text>
  <text x="924" y="512" fill="#94A3B8" font-size="12">Auto-detects language,</text>
  <text x="924" y="530" fill="#94A3B8" font-size="12">responds in kind. RTL ready.</text>

  <rect x="628" y="558" width="266" height="80" rx="10" fill="#10202D"/>
  <text x="648" y="582" fill="#3B82F6" font-size="20">🎙</text>
  <text x="680" y="582" fill="#E2E8F0" font-size="14" font-weight="600">Voice Ordering</text>
  <text x="648" y="602" fill="#94A3B8" font-size="12">Full speech-to-text ordering</text>
  <text x="648" y="620" fill="#94A3B8" font-size="12">for kiosk and table-side</text>

  <rect x="904" y="558" width="264" height="80" rx="10" fill="#2D1A00"/>
  <text x="924" y="582" fill="#F59E0B" font-size="20">⬆️</text>
  <text x="956" y="582" fill="#E2E8F0" font-size="14" font-weight="600">Smart Upsell</text>
  <text x="924" y="602" fill="#94A3B8" font-size="12">AI suggests pairings, add-ons</text>
  <text x="924" y="620" fill="#94A3B8" font-size="12">and seasonal specials</text>

  <rect x="628" y="648" width="266" height="70" rx="10" fill="#2D2000"/>
  <text x="648" y="672" fill="#FBBF24" font-size="20">⚡</text>
  <text x="680" y="672" fill="#E2E8F0" font-size="14" font-weight="600">Allergy Guard</text>
  <text x="648" y="692" fill="#94A3B8" font-size="12">Flags allergens, filters menu</text>
  <text x="648" y="706" fill="#EF4444" font-size="11">celiac · nut · dairy · shellfish</text>

  <rect x="904" y="648" width="264" height="70" rx="10" fill="#102D2D"/>
  <text x="924" y="672" fill="#06B6D4" font-size="20">📱</text>
  <text x="956" y="672" fill="#E2E8F0" font-size="14" font-weight="600">Phone Ordering</text>
  <text x="924" y="692" fill="#94A3B8" font-size="12">Twilio voice AI, SMS confirm,</text>
  <text x="924" y="706" fill="#94A3B8" font-size="11">routes to KDS automatically</text>

  <!-- Fire to kitchen button -->
  <rect x="616" y="742" width="568" height="72" rx="12" fill="#22C55E"/>
  <rect x="616" y="742" width="284" height="72" rx="12" fill="white" opacity="0.05"/>
  <text x="900" y="774" fill="white" font-size="20" font-weight="700" text-anchor="middle">🔥 Send to Kitchen — $26.58</text>
  <text x="900" y="800" fill="#D1FAE5" font-size="14" text-anchor="middle">Confirm via AI · Or continue ordering</text>

  <!-- Screen label -->
  <text x="600" y="878" fill="#1E2235" font-size="11" text-anchor="middle">Synalux POS — AI Ordering Assistant (F23 Online Ordering + AI Integration · 1200×900)</text>
</svg>
