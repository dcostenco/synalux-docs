<svg role="img" aria-labelledby="title-ipad_post_payment_tip-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1366 1024"
     font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif">

  <title id="title-ipad_post_payment_tip-svg">Synalux POS — post payment tip</title>
  <desc>Synalux POS mockup screen for post payment tip. All UI elements admin-configurable.</desc>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C0E1A"/>
      <stop offset="100%" stop-color="#080A14"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1D2E"/>
      <stop offset="100%" stop-color="#161930"/>
    </linearGradient>

    <!-- Amber button gradient -->
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Green submit gradient -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <!-- Phone bezel gradient -->
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2E45"/>
      <stop offset="100%" stop-color="#1E2235"/>
    </linearGradient>

    <!-- Phone screen inner glow -->
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1120"/>
      <stop offset="100%" stop-color="#0C0E1A"/>
    </linearGradient>

    <!-- Amber glow for selected tip -->
    <filter id="amberGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#F59E0B" flood-opacity="0.35"/>
    </filter>

    <!-- Green glow for submit -->
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22C55E" flood-opacity="0.3"/>
    </filter>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Phone shadow -->
    <filter id="phoneShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Subtle inner card glow -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Tip card selected highlight -->
    <linearGradient id="selectedTipBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D1F00"/>
      <stop offset="100%" stop-color="#1C1400"/>
    </linearGradient>

    <!-- Header brand gradient -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1D2E"/>
      <stop offset="100%" stop-color="#161930"/>
    </linearGradient>

    <!-- ════════════════════════════════════════════════════════ -->
    <!-- REUSABLE SYMBOLS                                        -->
    <!-- ════════════════════════════════════════════════════════ -->

    <!-- Admin gear icon for configurable elements -->
    <symbol id="adminGear" viewBox="0 0 14 14">
      <circle cx="7" cy="7" r="2.5" fill="none" stroke="#F59E0B" stroke-width="0.8" opacity="0.3"/>
      <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.8 2.8l1 1M10.2 10.2l1 1M2.8 11.2l1-1M10.2 3.8l1-1" stroke="#F59E0B" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
    </symbol>

    <!-- Tip percentage button (unselected) -->
    <symbol id="tipButton" viewBox="0 0 130 80">
      <rect x="0" y="0" width="130" height="80" rx="14" fill="url(#cardGrad)" filter="url(#subtleGlow)"/>
  <!-- Synalux POS -->
      <rect x="0" y="0" width="130" height="80" rx="14" fill="none" stroke="#2A2E45" stroke-width="1.5"/>
    </symbol>

    <!-- Action button base (full-width card-style) -->
    <symbol id="actionBtnBase" viewBox="0 0 424 56">
      <rect x="0" y="0" width="424" height="56" rx="14"/>
    </symbol>
  </defs>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- FULL BACKGROUND                                         -->
  <!-- ════════════════════════════════════════════════════════ -->
  <rect width="1366" height="1024" fill="url(#bgGrad)"/>

  <!-- Subtle radial ambient light behind phone -->
  <ellipse cx="683" cy="480" rx="400" ry="380" fill="#F59E0B" opacity="0.015"/>

  <!-- Title above phone -->
  <text x="683" y="40" fill="#475569" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="2">CUSTOMER VIEW  ·  POST-PAYMENT TIP SCREEN</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- PHONE DEVICE FRAME                                      -->
  <!-- ════════════════════════════════════════════════════════ -->
  <g filter="url(#phoneShadow)">
    <!-- Phone outer body -->
    <rect x="433" y="52" width="500" height="940" rx="48" fill="#1A1D2E" stroke="url(#bezelGrad)" stroke-width="3"/>

    <!-- Phone inner screen area -->
    <rect x="445" y="64" width="476" height="916" rx="40" fill="url(#screenGrad)"/>

    <!-- Notch -->
    <rect x="618" y="64" width="130" height="26" rx="13" fill="#1A1D2E"/>

    <!-- Status bar -->
    <text x="470" y="85" fill="#94A3B8" font-size="12" font-weight="600">9:41</text>
    <text x="903" y="85" fill="#94A3B8" font-size="11" text-anchor="end">5G  ●●●  ▊</text>

    <!-- Home indicator -->
    <rect x="633" y="960" width="100" height="5" rx="3" fill="#475569"/>
  </g>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SCREEN CONTENT                                          -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- ── Restaurant Header Bar ── -->
  <rect x="445" y="96" width="476" height="80" fill="#161930"/>
  <rect x="445" y="175" width="476" height="1" fill="#1E2235"/>

  <!-- Restaurant logo -->
  <circle cx="490" cy="136" r="24" fill="#F59E0B" opacity="0.15"/>
  <circle cx="490" cy="136" r="20" fill="#F59E0B"/>
  <text x="490" y="142" fill="#0C0E1A" font-size="16" font-weight="800" text-anchor="middle">B</text>

  <!-- Restaurant name and details -->
  <text x="522" y="129" fill="#E2E8F0" font-size="18" font-weight="700">Bistro Moderno</text>
  <text x="522" y="149" fill="#64748B" font-size="12">Table 7  ·  Order #4831</text>
  <text x="522" y="165" fill="#475569" font-size="11">May 29, 2026  ·  8:30 PM</text>

  <!-- ── Thank You Section ── -->
  <rect x="465" y="196" width="436" height="120" rx="16" fill="url(#cardGrad)" filter="url(#subtleGlow)"/>
  <rect x="465" y="196" width="436" height="120" rx="16" fill="none" stroke="#1E2235" stroke-width="1"/>

  <!-- Checkmark circle -->
  <circle cx="683" cy="232" r="18" fill="#22C55E" opacity="0.12"/>
  <circle cx="683" cy="232" r="14" fill="#22C55E" opacity="0.2"/>
  <text x="683" y="238" fill="#4ADE80" font-size="16" font-weight="700" text-anchor="middle">&#10003;</text>

  <text x="683" y="265" fill="#E2E8F0" font-size="18" font-weight="700" text-anchor="middle">Thank you for dining with us!</text>
  <text x="683" y="286" fill="#94A3B8" font-size="13" text-anchor="middle">Your server today was</text>
  <text x="683" y="305" fill="#F59E0B" font-size="15" font-weight="700" text-anchor="middle">John S.</text>

  <!-- ── Bill Summary ── -->
  <rect x="465" y="330" width="436" height="82" rx="12" fill="url(#cardGrad)" filter="url(#subtleGlow)"/>
  <rect x="465" y="330" width="436" height="82" rx="12" fill="none" stroke="#1E2235" stroke-width="1"/>

  <text x="487" y="357" fill="#94A3B8" font-size="12">Subtotal</text>
  <text x="879" y="357" fill="#CBD5E1" font-size="12" text-anchor="end">$59.72</text>

  <text x="487" y="377" fill="#94A3B8" font-size="12">Tax (8.5%)</text>
  <text x="879" y="377" fill="#CBD5E1" font-size="12" text-anchor="end">$5.08</text>

  <rect x="487" y="386" width="392" height="1" fill="#2A2E45"/>

  <text x="487" y="405" fill="#E2E8F0" font-size="14" font-weight="700">Total Paid</text>
  <text x="879" y="405" fill="#E2E8F0" font-size="14" font-weight="700" text-anchor="end">$64.80</text>

  <!-- ── Section Label: Add a Tip ── -->
  <!-- Admin: tip_prompt_text (configurable) -->
  <text x="683" y="444" fill="#94A3B8" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1.5">WOULD YOU LIKE TO LEAVE A TIP?</text>
  <use href="#adminGear" x="844" y="434" width="14" height="14"/>

  <!-- ── Tip Percentage Buttons ── -->
  <!-- Admin: tip_percentages, default_selected_tip (configurable) -->
  <!-- Row 1: 15%, 18%, 20% -->

  <!-- 15% Button -->
  <g>
    <use href="#tipButton" x="471" y="460" width="130" height="80"/>
    <text x="536" y="494" fill="#CBD5E1" font-size="20" font-weight="700" text-anchor="middle">15%</text>
    <text x="536" y="516" fill="#64748B" font-size="13" text-anchor="middle">$9.72</text>
  </g>

  <!-- 18% Button -->
  <g>
    <use href="#tipButton" x="614" y="460" width="138" height="80"/>
    <text x="683" y="494" fill="#CBD5E1" font-size="20" font-weight="700" text-anchor="middle">18%</text>
    <text x="683" y="516" fill="#64748B" font-size="13" text-anchor="middle">$11.66</text>
  </g>

  <!-- 20% Button — SELECTED -->
  <rect x="765" y="456" width="138" height="88" rx="14" fill="url(#selectedTipBg)" filter="url(#amberGlow)"/>
  <rect x="765" y="456" width="138" height="88" rx="14" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <text x="834" y="490" fill="#F59E0B" font-size="22" font-weight="800" text-anchor="middle">20%</text>
  <text x="834" y="514" fill="#FBBF24" font-size="14" font-weight="600" text-anchor="middle">$12.96</text>
  <!-- Selected check badge -->
  <circle cx="890" cy="466" r="11" fill="#F59E0B"/>
  <text x="890" y="471" fill="#0C0E1A" font-size="12" font-weight="800" text-anchor="middle">&#10003;</text>
  <!-- "Popular" label -->
  <rect x="802" y="528" width="64" height="16" rx="8" fill="#F59E0B" opacity="0.15"/>
  <text x="834" y="540" fill="#F59E0B" font-size="9" font-weight="600" text-anchor="middle">POPULAR</text>
  <use href="#adminGear" x="870" y="530" width="14" height="14"/>

  <!-- Row 2: 25%, Custom -->

  <!-- 25% Button -->
  <g>
    <rect x="471" y="558" width="202" height="72" rx="14" fill="url(#cardGrad)" filter="url(#subtleGlow)"/>
    <rect x="471" y="558" width="202" height="72" rx="14" fill="none" stroke="#2A2E45" stroke-width="1.5"/>
    <text x="572" y="590" fill="#CBD5E1" font-size="20" font-weight="700" text-anchor="middle">25%</text>
    <text x="572" y="614" fill="#64748B" font-size="13" text-anchor="middle">$16.20</text>
  </g>

  <!-- Custom Button -->
  <g>
    <rect x="686" y="558" width="217" height="72" rx="14" fill="url(#cardGrad)" filter="url(#subtleGlow)"/>
    <rect x="686" y="558" width="217" height="72" rx="14" fill="none" stroke="#2A2E45" stroke-width="1.5"/>
    <!-- Pencil icon hint -->
    <text x="775" y="590" fill="#CBD5E1" font-size="18" font-weight="700" text-anchor="middle">Custom</text>
    <text x="775" y="614" fill="#64748B" font-size="13" text-anchor="middle">Enter amount</text>
    <!-- Edit icon -->
    <rect x="845" y="578" width="34" height="34" rx="8" fill="#1E2235"/>
    <text x="862" y="600" fill="#64748B" font-size="14" text-anchor="middle">&#9998;</text>
  </g>

  <!-- ── Selected Tip Summary ── -->
  <rect x="471" y="648" width="424" height="58" rx="12" fill="#1C1400" stroke="#F59E0B" stroke-width="1" opacity="0.7"/>
  <text x="683" y="672" fill="#94A3B8" font-size="12" text-anchor="middle">Tip amount</text>
  <text x="683" y="696" fill="#FBBF24" font-size="22" font-weight="800" text-anchor="middle">$12.96</text>

  <!-- ── Submit Button ── -->
  <!-- Admin: submit_button_label (configurable) -->
  <g filter="url(#greenGlow)">
    <rect x="471" y="722" width="424" height="56" rx="14" fill="url(#greenGrad)"/>
  </g>
  <text x="683" y="756" fill="#0C0E1A" font-size="17" font-weight="700" text-anchor="middle">Submit Tip</text>

  <!-- ── No Tip Option ── -->
  <!-- Admin: show_no_tip_option (configurable) -->
  <rect x="571" y="792" width="224" height="36" rx="10" fill="none" stroke="#2A2E45" stroke-width="1"/>
  <text x="683" y="815" fill="#64748B" font-size="13" text-anchor="middle">No tip, thanks</text>
  <use href="#adminGear" x="800" y="796" width="14" height="14"/>

  <!-- ── Footer ── -->
  <rect x="445" y="844" width="476" height="1" fill="#1E2235"/>
  <!-- Admin: tip_footer_message (configurable) -->
  <text x="683" y="866" fill="#475569" font-size="11" text-anchor="middle">Tips go directly to your server. Thank you!</text>

  <!-- Security badge -->
  <rect x="640" y="878" width="86" height="24" rx="12" fill="#22C55E" opacity="0.08"/>
  <rect x="640" y="878" width="86" height="24" rx="12" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>
  <text x="683" y="895" fill="#4ADE80" font-size="10" font-weight="600" text-anchor="middle">&#128274; Secure</text>

  <!-- Admin: qr_link_expiry_hours (configurable) -->
  <text x="683" y="918" fill="#475569" font-size="9" text-anchor="middle">Powered by Stripe  ·  Expires in 23h 51m</text>
  <use href="#adminGear" x="810" y="908" width="14" height="14"/>
  <text x="683" y="934" fill="#475569" font-size="9" text-anchor="middle">bistromoderno.pos/tip/tok_4831_x9kR2p</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- SIDE ANNOTATIONS (subtle, documentation-style)          -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Left annotation -->
  <g opacity="0.5">
    <rect x="40" y="200" width="340" height="150" rx="12" fill="#161930" stroke="#1E2235" stroke-width="1"/>
    <text x="60" y="228" fill="#64748B" font-size="11" font-weight="600" letter-spacing="1">HOW IT WORKS</text>
    <rect x="60" y="238" width="300" height="1" fill="#1E2235"/>
    <text x="60" y="260" fill="#94A3B8" font-size="11">1. Payment processed at the POS terminal</text>
    <text x="60" y="280" fill="#94A3B8" font-size="11">2. QR code printed on receipt / displayed</text>
    <text x="60" y="300" fill="#94A3B8" font-size="11">3. Customer scans with their phone</text>
    <text x="60" y="320" fill="#94A3B8" font-size="11">4. This tip screen loads in their browser</text>
    <text x="60" y="340" fill="#94A3B8" font-size="11">5. Tip captured via Stripe PaymentIntent</text>
  </g>

  <!-- Right annotation -->
  <g opacity="0.5">
    <rect x="986" y="200" width="340" height="130" rx="12" fill="#161930" stroke="#1E2235" stroke-width="1"/>
    <text x="1006" y="228" fill="#64748B" font-size="11" font-weight="600" letter-spacing="1">TIP FLOW</text>
    <rect x="1006" y="238" width="300" height="1" fill="#1E2235"/>

    <circle cx="1022" cy="260" r="6" fill="#F59E0B"/>
    <text x="1036" y="264" fill="#94A3B8" font-size="11">Customer selects tip percentage</text>

    <circle cx="1022" cy="284" r="6" fill="#60A5FA"/>
    <text x="1036" y="288" fill="#94A3B8" font-size="11">Amount calculated from bill total</text>

    <circle cx="1022" cy="308" r="6" fill="#22C55E"/>
    <text x="1036" y="312" fill="#94A3B8" font-size="11">Stripe captures the tip amount</text>
  </g>

  <!-- Right annotation: data schema -->
  <g opacity="0.45">
    <rect x="986" y="360" width="340" height="170" rx="12" fill="#161930" stroke="#1E2235" stroke-width="1"/>
    <text x="1006" y="388" fill="#64748B" font-size="11" font-weight="600" letter-spacing="1">DB: pos_post_payment_tips</text>
    <rect x="1006" y="398" width="300" height="1" fill="#1E2235"/>
    <text x="1006" y="418" fill="#475569" font-size="10" font-family="'SF Mono','Courier New',monospace">tip_token    uuid UNIQUE</text>
    <text x="1006" y="436" fill="#475569" font-size="10" font-family="'SF Mono','Courier New',monospace">amount_cents int</text>
    <text x="1006" y="454" fill="#475569" font-size="10" font-family="'SF Mono','Courier New',monospace">tip_pct      decimal(5,2)</text>
    <text x="1006" y="472" fill="#475569" font-size="10" font-family="'SF Mono','Courier New',monospace">stripe_pi_id varchar</text>
    <text x="1006" y="490" fill="#475569" font-size="10" font-family="'SF Mono','Courier New',monospace">status       pending|captured</text>
    <text x="1006" y="516" fill="#475569" font-size="10">Edge Function: confirm-tip</text>
  </g>

  <!-- Left annotation: config -->
  <g opacity="0.45">
    <rect x="40" y="400" width="340" height="90" rx="12" fill="#161930" stroke="#1E2235" stroke-width="1"/>
    <text x="60" y="428" fill="#64748B" font-size="11" font-weight="600" letter-spacing="1">CONFIGURATION</text>
    <rect x="60" y="438" width="300" height="1" fill="#1E2235"/>
    <text x="60" y="458" fill="#94A3B8" font-size="11">Default tip options: 15%, 18%, 20%, 25%</text>
    <text x="60" y="478" fill="#94A3B8" font-size="11">QR link expiry: 24 hours</text>
  </g>

</svg>
